<!DOCTYPE html>
<!--
  ====================================================================
  dashboard_completa_mobileV6.html
  Dashboard completa para gerenciamento de partidas de Mobile Legends:
  Bang Bang (MLBB). Possui 4 abas principais:
    - Manual     : Seleção manual de cartas/modos
    - Roleta     : Roleta aleatória de modos
    - Draft      : Sistema de torneio com chaves (dupla eliminação)
    - Nova Carta : Criação de cartas customizadas
  Sincronizado com Firebase Realtime Database para overlay externo.
  ====================================================================
-->
<html lang="pt-br">

<head>
    <!--
      Meta tags essenciais:
      - charset=UTF-8  : Suporte a caracteres acentuados (português)
      - viewport       : Responsividade em dispositivos móveis
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Completa - MLBB</title>

    <!--
      Google Fonts:
      - Inter   : Fonte principal (pesos 400, 500, 600, 700)
      - Outfit  : Fonte para títulos e destaques (pesos 600, 800)
    -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;800&display=swap"
        rel="stylesheet">

    <!--
      Lucide Icons (unpkg CDN):
      Biblioteca de ícones SVG via atributo data-lucide.
      Inicializada com lucide.createIcons() no final do script.
    -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /*
          ==========================================================
          VARIÁVEIS GLOBAIS (CSS Custom Properties)
          Tema escuro com destaque em dourado (MLBB-inspired).
          ==========================================================
        */
        :root {
            --background: #09090b;
            /* Fundo principal (preto profundo) */
            --foreground: #fafafa;
            /* Texto principal (quase branco) */
            --surface: #18181b;
            /* Superfície de cartões/containers */
            --surface-hover: #27272a;
            /* Hover de superfícies interativas */
            --primary: #d4af37;
            /* Dourado MLBB (cor primária) */
            --primary-hover: #fcd34d;
            /* Dourado mais claro para hover */
            --muted-foreground: #a1a1aa;
            /* Texto secundário/cinza */
            --border: #27272a;
            /* Cor de bordas padrão */
            --danger: #ef4444;
            /* Vermelho para ações destrutivas */
            --success: #22c55e;
            /* Verde para sucesso/ativo */
            --radius: 8px;
            /* Raio de borda padrão */
        }

        /*
          Reset universal:
          Remove margens/paddings padrão e força box-sizing consistente.
        */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /*
          Body:
          Layout flex em linha (sidebar + main), ocupa viewport inteira.
          overflow: hidden evita scroll duplicado (scroll apenas no <main>).
        */
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background);
            color: var(--foreground);
            display: flex;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /*
          ==========================================================
          SIDEBAR (barra lateral esquerda)
          Largura fixa de 220px, fundo escuro, borda direita sutil.
          Contém: brand (logo), botões de navegação, botão "Esconder".
          ==========================================================
        */
        aside {
            width: 220px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 1.5rem 1rem;
        }

        /*
          Brand (logo/título):
          Ícone + "MLBB ADMIN" no topo da sidebar.
        */
        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 3rem;
            color: var(--primary);
        }

        /*
          Botão de navegação (nav-btn):
          Estilo base para todas as abas do menu lateral.
          - Largura total (100%) para preencher a sidebar
          - Hover: realça a superfície
          - Active: fundo dourado translúcido + texto dourado
        */
        .nav-btn {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            color: var(--muted-foreground);
            border-radius: var(--radius);
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .nav-btn:hover {
            background: var(--surface-hover);
            color: var(--foreground);
        }

        .nav-btn.active {
            background: rgba(212, 175, 55, 0.1);
            color: var(--primary);
        }

        /*
          ==========================================================
          MAIN CONTENT (conteúdo principal)
          Ocupa o espaço restante ao lado da sidebar.
          overflow-y: auto permite scroll vertical quando necessário.
          ==========================================================
        */
        main {
            flex: 1;
            padding: 2.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /*
          Header (topo da área principal):
          Título da aba atual à esquerda, status pill à direita.
        */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        /*
          Status pill (indicador de overlay):
          Pequena cápsula que mostra se o overlay está visível ou oculto.
          Combina com o Firebase (nó "showcase").
        */
        .status-pill {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            background: var(--surface);
            padding: 0.5rem 1rem;
            border-radius: 999px;
            border: 1px solid var(--border);
            color: var(--muted-foreground);
        }

        /*
          Dot (bolinha de status):
          - Padrão: vermelha (overlay oculto)
          - .active: verde com glow (overlay visível)
        */
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--danger);
        }

        .dot.active {
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
        }

        /*
          ==========================================================
          TAB CONTENT (conteúdo das abas)
          Apenas uma aba por vez fica visível (.active).
          Animação fadeIn suave ao trocar de aba.
          ==========================================================
        */
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        /*
          Keyframes: fadeIn
          Desloca 5px para cima enquanto aumenta opacidade.
        */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /*
          ==========================================================
          SELEÇÃO MANUAL (Grid de Categorias)
          Grid responsivo com auto-fill para cartões de categoria.
          Cada cartão contém botões de modo (cartas).
          ==========================================================
        */
        .manual-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1rem;
        }

        /*
          Cartão de categoria:
          Container para agrupar modos de uma mesma categoria.
        */
        .cat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem;
        }

        /*
          Título da categoria:
          Dourado, uppercase, com ícone Lucide à esquerda.
        */
        .cat-title {
            color: var(--primary);
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /*
          Botão de modo (carta individual):
          - Largura total dentro do cartão
          - Hover: realça borda e fundo
          - Active: borda dourada + fundo translúcido (modo selecionado)
          - .check-icon aparece apenas quando ativo
        */
        .mode-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 0.5rem 0.75rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--foreground);
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 0.4rem;
            font-size: 0.8rem;
        }

        .mode-btn:hover {
            background: var(--surface-hover);
            border-color: var(--muted-foreground);
        }

        .mode-btn.active {
            border-color: var(--primary);
            background: rgba(212, 175, 55, 0.05);
            color: var(--primary);
        }

        .mode-btn .check-icon {
            display: none;
            /* Ícone de check oculto por padrão */
        }

        .mode-btn.active .check-icon {
            display: block;
            /* Exibe check quando o modo está selecionado */
        }

        /*
          ==========================================================
          ROLETA (Layout principal + Grid de Seleção)
          Layout em duas colunas: roda (canvas) e checkboxes.
          ==========================================================
        */
        .roleta-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            /* Duas colunas iguais */
            gap: 2.5rem;
            align-items: start;
        }

        /*
          Caixa da roleta:
          Container que envolve o canvas e o botão "Girar".
        */
        .wheel-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /*
          Container da roda:
          Proporção 1:1 (quadrado perfeito), posicionamento relativo
          para o ponteiro absoluto.
        */
        .wheel-container {
            position: relative;
            width: 100%;
            max-width: 380px;
            aspect-ratio: 1 / 1;
        }

        /*
          Canvas da roleta:
          A transição transform é usada para animar o giro (rotação).
          cubic-bezier suave com easing personalizado.
        */
        #wheel-canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transition: transform 2s cubic-bezier(0.15, 0, 0.15, 1);
        }

        /*
          Ponteiro da roleta (triângulo dourado):
          Posicionado no topo central, apontando para baixo.
        */
        .wheel-pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 25px;
            height: 25px;
            background: var(--primary);
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 10;
        }

        /*
          Botão "Girar Roleta":
          Fundo dourado, texto preto, uppercase, ocupando largura total.
          - Hover: tom mais claro + leve elevação
          - Disabled: opacidade reduzida, cursor not-allowed
        */
        .spin-btn {
            background: var(--primary);
            color: black;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 800;
            border-radius: var(--radius);
            cursor: pointer;
            width: 100%;
            margin-top: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .spin-btn:hover:not(:disabled) {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        .spin-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /*
          Grid de seleção de modos para a roleta:
          Checkboxes em grid responsivo, cada um representando um modo.
        */
        .modes-grid-selection {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 0.75rem;
        }

        /*
          Item de modo (checkbox estilizado):
          Label clicável com fundo escuro e borda.
        */
        .mode-item-cb {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 0.75rem;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .mode-item-cb:hover {
            background: var(--surface-hover);
        }

        /*
          Input checkbox dentro do item:
          accent-color dourado para manter o tema.
        */
        .mode-item-cb input {
            accent-color: var(--primary);
            width: 16px;
            height: 16px;
        }

        /*
          ==========================================================
          AÇÕES GLOBAIS
          Botão "Esconder" (destrutivo) na sidebar.
          ==========================================================
        */
        .btn-danger {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 0.75rem;
            border-radius: var(--radius);
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-weight: 600;
            margin-top: 1rem;
        }

        .btn-danger:hover {
            background: var(--danger);
            color: white;
        }

        /*
          ==========================================================
          DRAFT TAB (Sistema de Torneio)
          Seção superior: roleta (esquerda) + controles (direita).
          ==========================================================
        */
        .draft-top-section {
            display: grid;
            grid-template-columns: 1fr 400px;
            /* Roleta + painel de controle */
            gap: 2rem;
            margin-bottom: 2rem;
        }

        /*
          Caixa da roleta do draft:
          Similar à roleta de modos, mas com borda e sombra extras.
        */
        .draft-wheel-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /*
          Container da roleta do draft:
          Proporção 1:1, tamanho máximo 400px.
        */
        .draft-wheel-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1 / 1;
        }

        /*
          Canvas da roleta do draft:
          Borda espessa e sombra para destaque visual.
          Transição suave para animação de giro.
        */
        #draft-wheel-canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 5px solid var(--border);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            transition: transform 2s cubic-bezier(0.15, 0, 0.15, 1);
        }

        /*
          Ponteiro da roleta do draft (triângulo dourado).
        */
        .draft-wheel-pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 25px;
            height: 25px;
            background: var(--primary);
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 10;
        }

        /*
          Controles do draft (painel direito):
          Coluna flexível com cartões empilhados.
        */
        .draft-controls {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /*
          Cartão genérico:
          Usado nos controles do draft para agrupar seções.
        */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
        }

        /*
          Título do cartão:
          Dourado, negrito, com ícone Lucide.
        */
        .card h2 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /*
          Scrollbar customizada para a lista de equipes.
        */
        .teams-list::-webkit-scrollbar {
            width: 6px;
        }

        .teams-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        /*
          ==========================================================
          ÁRVORE DE CHAVES (BRACKET) COM ZOOM E PAN
          Sistema de dupla eliminação renderizado em colunas.
          Inclui controles de zoom (+/-/reset) e arrasto (pan).
          ==========================================================
        */

        /*
          Wrapper da árvore:
          Posição relativa para ancorar os controles de zoom.
        */
        .bracket-wrapper {
            position: relative;
            width: 100%;
        }

        /*
          Controles de Zoom:
          Posicionados absolutamente no canto superior direito.
          Fundo semi-transparente com blur.
        */
        .zoom-controls {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            display: flex;
            gap: 0.5rem;
            z-index: 50;
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(8px);
            padding: 0.5rem;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        /*
          Botões individuais de zoom.
        */
        .btn-zoom {
            background: var(--background);
            color: var(--foreground);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.5rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-zoom:hover {
            background: var(--surface-hover);
            color: var(--primary);
        }

        /*
          Viewport (área de visualização das chaves):
          Com scroll nativo (overflow: auto) e cursor grab para arrastar.
          max-height: 80vh para não ocupar a tela toda no celular.
        */
        .bracket-viewport {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            overflow: auto;
            max-height: 80vh;
            cursor: grab;
            position: relative;
        }

        .bracket-viewport:active {
            cursor: grabbing;
        }

        /*
          Scrollbar customizada do viewport (Webkit).
        */
        .bracket-viewport::-webkit-scrollbar {
            height: 8px;
            width: 8px;
        }

        .bracket-viewport::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        /*
          Conteúdo escalável:
          transform-origin: top left para zoom manter o canto como referência.
          min-width: 1000px evita que os blocos fiquem esmagados.
        */
        .bracket-scale-content {
            transform-origin: top left;
            transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
            min-width: 1000px;
            padding-bottom: 2rem;
        }

        /*
          Coluna de rodada:
          Agrupa partidas verticalmente dentro de uma rodada.
        */
        .round-col {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /*
          Caixa de partida (match):
          Largura fixa 220px, fundo escuro, sombra.
        */
        .match-box {
            border: 1px solid var(--border);
            border-radius: 8px;
            width: 220px;
            background: var(--background);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            flex-shrink: 0;
        }

        /*
          Nome da partida (ex: "Quartas 1", "Semi 2"):
          Faixa superior dentro da match-box.
        */
        .match-name {
            background: var(--surface-hover);
            font-size: 0.75rem;
            padding: 4px 8px;
            text-align: center;
            color: #a1a1aa;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            text-transform: uppercase;
        }

        /*
          Slot de equipe:
          Cada partida tem 2 slots (time 1 e time 2).
          - clickable:hover: destaca verde se ambos os times existirem e sem vencedor
          - winner: destaca dourado com borda esquerda
          - can-undo:hover: mostra botão de desfazer (vermelho)
        */
        .team-slot {
            padding: 0.75rem;
            font-weight: 600;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--border);
            transition: 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        .team-slot:last-child {
            border-bottom: none;
        }

        .team-slot.clickable:hover {
            background: rgba(74, 222, 128, 0.15);
            cursor: pointer;
        }

        .team-slot.winner {
            background: rgba(212, 175, 55, 0.1);
            border-left: 3px solid var(--primary);
        }

        /*
          Ações do slot (ícone check + botão desfazer).
        */
        .team-slot .slot-actions {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .team-slot.winner.can-undo:hover {
            background: rgba(239, 68, 68, 0.15);
            border-left: 3px solid var(--danger);
            cursor: pointer;
        }

        /*
          Botão "Desfazer" (undo):
          Aparece apenas ao passar o mouse sobre um vencedor.
          Esconde o ícone de check simultaneamente.
        */
        .undo-btn {
            display: none;
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
            border: 1px solid var(--danger);
            border-radius: 4px;
            padding: 2px 4px;
            cursor: pointer;
            transition: 0.2s;
        }

        .undo-btn:hover {
            background: var(--danger);
            color: white;
        }

        .team-slot.winner.can-undo:hover .undo-btn {
            display: flex;
        }

        .team-slot.winner.can-undo:hover .check-icon-winner {
            display: none;
        }

        /*
          Título de seção (chave superior / inferior):
          Fonte Outfit, espaçamento de letras.
        */
        .section-title {
            color: white;
            margin-bottom: 1.5rem;
            text-align: center;
            font-family: 'Outfit';
            letter-spacing: 1px;
        }

        /*
          Botões de ação genéricos:
          Usado para "Reiniciar", "Apagar", "Imprimir", etc.
        */
        .btn-action {
            flex: 1;
            padding: 0.75rem 0.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            border: none;
        }

        /*
          Botão "Reiniciar" (laranja):
          Mantém os nomes mas zera as chaves.
        */
        .btn-restart {
            background: rgba(251, 146, 60, 0.1);
            border: 1px dashed #fb923c;
            color: #fb923c;
        }

        .btn-restart:hover {
            background: rgba(251, 146, 60, 0.2);
        }

        /*
          Botão "Apagar" (vermelho):
          Remove todos os times e chaves.
        */
        .btn-delete {
            background: rgba(239, 68, 68, 0.1);
            border: 1px dashed #ef4444;
            color: #ef4444;
        }

        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.2);
        }


        /*
          ==========================================================
          RESPONSIVO (max-width: 768px)
          Adaptações para tablets e celulares.
          Sidebar vira barra inferior fixa com botões compactos.
          ==========================================================
        */
        @media (max-width: 768px) {

            /*
              Body: layout em coluna para empilhar os elementos.
            */
            body {
                flex-direction: column;
            }

            /*
              Sidebar fixa na parte inferior:
              - position: fixed para ficar sempre visível
              - padding-bottom extra para safe-area (iPhone X+)
              - backdrop-filter: blur para efeito vidro fosco
            */
            aside {
                position: fixed;
                bottom: 0;
                left: 0;
                width: 100%;
                height: auto;
                flex-direction: row;
                padding: 0.5rem;
                padding-bottom: max(0.5rem, env(safe-area-inset-bottom));
                border-right: none;
                border-top: 1px solid var(--border);
                background: rgba(24, 24, 27, 0.95);
                backdrop-filter: blur(10px);
                z-index: 50;
            }

            /*
              Oculta o brand (logo + título) em mobile.
            */
            .brand {
                display: none;
            }

            /*
              Botões de navegação em coluna (ícone em cima, texto embaixo).
              Distribuídos igualmente com flex: 1.
            */
            .nav-btn {
                flex-direction: column;
                margin-bottom: 0;
                padding: 0.5rem 0.25rem;
                justify-content: center;
                gap: 0.4rem;
                font-size: 0.65rem;
                font-weight: 600;
                width: auto;
                flex: 1;
                border-radius: 8px;
                text-align: center;
                line-height: 1.1;
                white-space: normal;
            }

            /*
              Ícones menores e centralizados.
            */
            .nav-btn i {
                width: 20px !important;
                height: 20px !important;
                margin: 0 auto;
            }

            /*
              Container interno da sidebar vira flex row.
            */
            aside>div {
                margin-top: 0 !important;
                flex: 1;
                display: flex;
            }

            /*
              Botão "Esconder" adaptado para mobile:
              Mesmo estilo compacto dos nav-btns.
            */
            .btn-danger {
                margin-top: 0;
                padding: 0.5rem 0.25rem;
                font-size: 0.65rem;
                font-weight: 600;
                flex-direction: column;
                gap: 0.4rem;
                border: none;
                background: transparent;
                width: 100%;
                height: 100%;
                text-align: center;
                line-height: 1.1;
                white-space: normal;
            }

            .btn-danger:hover {
                background: rgba(239, 68, 68, 0.1);
                color: var(--danger);
            }

            .btn-danger i {
                width: 20px !important;
                height: 20px !important;
                margin: 0 auto;
            }

            /*
              Texto dos botões oculto por padrão, aparece apenas no botão ativo.
            */
            .nav-text {
                display: none;
            }

            .nav-btn.active .nav-text {
                display: block;
                animation: fadeIn 0.3s ease;
            }

            /*
              Main: padding inferior extra para não ficar atrás da sidebar fixa.
            */
            main {
                padding: 1.5rem 1rem 6rem 1rem;
            }

            /*
              Header em coluna (título em cima, status embaixo).
            */
            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }

            /*
              Roleta: coluna única em mobile.
            */
            .roleta-layout {
                grid-template-columns: 1fr;
            }

            .wheel-box {
                padding: 1.5rem 1rem;
            }

            .spin-btn {
                padding: 1rem;
                font-size: 1rem;
            }

            /*
              Draft seção superior: coluna única.
            */
            .draft-top-section {
                grid-template-columns: 1fr;
            }

            .draft-wheel-box {
                padding: 1.5rem 1rem;
            }

            .bracket-viewport {
                padding: 1rem;
            }
        }

        /*
          ==========================================================
          ESTILOS DE IMPRESSÃO
          Usado para imprimir/gerar PDF somente das chaves do torneio.
          ==========================================================
        */
        @media print {

            /*
              Garante que as cores sejam impressas.
            */
            body {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                background-color: var(--surface);
            }

            /*
              Oculta tudo exceto o wrapper das chaves.
            */
            body * {
                visibility: hidden;
            }

            .bracket-wrapper,
            .bracket-wrapper * {
                visibility: visible;
            }

            /*
              Wrapper ocupa a página toda.
            */
            .bracket-wrapper {
                position: absolute;
                left: 0;
                top: 0;
                width: 100vw;
            }

            /*
              Viewport sem scroll, sem bordas, sem padding.
            */
            .bracket-viewport {
                overflow: visible !important;
                background: var(--surface) !important;
                border: none !important;
                padding: 0 !important;
                max-height: none !important;
            }

            /*
              Oculta controles de zoom, botão de imprimir, e botões de ação.
            */
            .zoom-controls,
            #btn-print-bracket,
            .undo-btn,
            .check-icon-winner {
                display: none !important;
            }

            /*
              Escala o conteúdo para caber melhor em uma página A4.
            */
            .bracket-scale-content {
                transform: scale(0.65) !important;
                transform-origin: top left !important;
            }
        }
    </style>
</head>

<body>

    <!--
      ============================================================
      SIDEBAR (barra lateral / mobile: barra inferior)
      Contém:
        - Brand: logo + "MLBB ADMIN"
        - 4 botões de navegação (Manual, Roleta, Draft, Nova Carta)
        - Botão "Esconder" (oculta overlay no Firebase)
      ============================================================
    -->
    <aside>
        <!-- Brand / Logo -->
        <div class="brand">
            <i data-lucide="layout-dashboard" style="width: 28px;"></i>
            <h1 style="font-family: 'Outfit'; font-size: 1.2rem;">MLBB ADMIN</h1>
        </div>

        <!-- Botões de navegação das abas -->
        <button class="nav-btn active" onclick="switchTab('manual')">
            <i data-lucide="mouse-pointer-2"></i> <span class="nav-text">Manual</span>
        </button>
        <button class="nav-btn" onclick="switchTab('roleta')">
            <i data-lucide="rotate-cw"></i> <span class="nav-text">Roleta</span>
        </button>
        <button class="nav-btn" onclick="switchTab('draft')">
            <i data-lucide="users"></i> <span class="nav-text">Draft</span>
        </button>
        <button class="nav-btn" onclick="switchTab('add')">
            <i data-lucide="plus-square"></i> <span class="nav-text">Nova Carta</span>
        </button>

        <!-- Botão "Esconder" - empurrado para o fim da sidebar -->
        <div style="margin-top: auto;">
            <button id="btn-hide-global" class="btn-danger">
                <i data-lucide="eye-off"></i> <span class="nav-text">Esconder</span>
            </button>
        </div>
    </aside>

    <!--
      ============================================================
      MAIN (conteúdo principal)
      Header com título + status, e 4 abas (tab-content).
      ============================================================
    -->
    <main>
        <!--
          Header: título da aba atual + indicador de overlay.
        -->
        <div class="header">
            <h2 id="tab-title" style="font-size: 1.5rem; font-family: 'Outfit';">Seleção Manual</h2>
            <!-- Status pill: mostra se overlay está visível ou oculto -->
            <div class="status-pill">
                <div id="status-dot" class="dot"></div>
                <span id="status-text">Overlay Oculto</span>
            </div>
        </div>

        <!--
          ==========================================================
          TAB: MANUAL (Seleção Manual)
          Grid de categorias com cartas/modos.
          Cada botão de modo envia ao Firebase para exibir no overlay.
          ==========================================================
        -->
        <div id="tab-manual" class="tab-content active">
            <div id="manual-container" class="manual-grid">
                <!-- Preenchido dinamicamente via JS (renderManualCards) -->
            </div>
        </div>

        <!--
          ==========================================================
          TAB: NOVA CARTA (Criar Carta Customizada)
          Formulário para criar cartas personalizadas que são
          salvas no Firebase (nó "custom_cards").
          ==========================================================
        -->
        <div id="tab-add" class="tab-content">
            <div class="card" style="max-width: 600px; margin: 0 auto;">
                <h3
                    style="color: var(--primary); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; font-family: 'Outfit';">
                    <i data-lucide="plus-circle"></i> Criar Carta Customizada
                </h3>
                <form id="add-card-form" style="display: flex; flex-direction: column; gap: 1rem;">
                    <!-- Campo: Nome da Carta -->
                    <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                        <label style="font-size: 0.85rem; color: var(--muted-foreground); font-weight: 500;">Nome da
                            Carta</label>
                        <input type="text" id="new-card-name" required placeholder="Ex: Modo Espelho"
                            style="padding: 0.85rem; border-radius: 8px; border: 1px solid var(--border); background: var(--background); color: var(--foreground); outline: none;">
                    </div>
                    <!-- Campo: Nome do arquivo de imagem -->
                    <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                        <label style="font-size: 0.85rem; color: var(--muted-foreground); font-weight: 500;">Nome do
                            Arquivo (em assets/)</label>
                        <input type="text" id="new-card-img" required placeholder="Ex: CARTA_ESPELHO.jpeg"
                            style="padding: 0.85rem; border-radius: 8px; border: 1px solid var(--border); background: var(--background); color: var(--foreground); outline: none;">
                    </div>
                    <!-- Campo: Categoria (select) -->
                    <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                        <label
                            style="font-size: 0.85rem; color: var(--muted-foreground); font-weight: 500;">Categoria</label>
                        <select id="new-card-cat"
                            style="padding: 0.85rem; border-radius: 8px; border: 1px solid var(--border); background: var(--background); color: var(--foreground); outline: none;">
                            <option value="Especiais">Especiais</option>
                            <option value="Classes">Classes</option>
                            <option value="Lanes">Lanes</option>
                            <option value="Proibições">Proibições</option>
                            <option value="Custom">Customizados</option>
                        </select>
                    </div>
                    <!-- Campo: Cor personalizada (color picker) -->
                    <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                        <label style="font-size: 0.85rem; color: var(--muted-foreground); font-weight: 500;">Cor Base
                            (Roleta e Textos)</label>
                        <input type="color" id="new-card-color" value="#d4af37"
                            style="height: 50px; width: 100%; border-radius: 8px; border: 1px solid var(--border); background: var(--background); cursor: pointer;">
                    </div>
                    <!-- Botão de submit -->
                    <button type="submit"
                        style="background: var(--primary); color: black; border: none; padding: 1rem; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; margin-top: 1rem; font-size: 1rem;">
                        Salvar Nova Carta
                    </button>
                </form>
            </div>
        </div>

        <!--
          ==========================================================
          TAB: ROLETA (Sorteio Aleatório de Modos)
          Layout em duas colunas:
            - Esquerda: canvas da roleta + botão girar + resultado
            - Direita : grid de checkboxes para selecionar modos ativos
          Sincroniza com Firebase (roleta_command, roleta_config).
          ==========================================================
        -->
        <div id="tab-roleta" class="tab-content">
            <div class="roleta-layout">
                <!-- Coluna esquerda: roleta visual -->
                <div class="wheel-box">
                    <div class="wheel-container">
                        <!-- Ponteiro fixo no topo -->
                        <div class="wheel-pointer"></div>
                        <!-- Canvas onde a roleta é desenhada via JS -->
                        <canvas id="wheel-canvas" width="1000" height="1000"></canvas>
                    </div>
                    <button id="trigger-spin" class="spin-btn">Girar Roleta</button>
                    <!-- Exibição do último resultado sorteado -->
                    <div style="margin-top: 1.5rem; text-align: center;">
                        <span style="color: var(--muted-foreground); font-size: 0.8rem;">Último Resultado:</span>
                        <div id="winner-name" style="font-size: 1.5rem; font-weight: 800; color: var(--primary);">---
                        </div>
                    </div>
                </div>

                <!-- Coluna direita: seleção de modos ativos -->
                <div class="selection-box">
                    <h3 class="cat-title" style="margin-bottom: 1.5rem;"><i data-lucide="settings-2"></i> Modos Ativos
                        na Roleta</h3>
                    <div id="roleta-selection-grid" class="modes-grid-selection">
                        <!-- Checkboxes em grid, injetados via JS -->
                    </div>
                </div>
            </div>
        </div>

        <!--
          ==========================================================
          TAB: DRAFT (Torneio com Chaves)
          Sistema de dupla eliminação com:
            - Roleta para sortear equipes
            - Adição de equipes e BYEs
            - Chave superior e inferior
            - Zoom e pan na árvore
            - Botões Instantâneo e Automático
          ==========================================================
        -->
        <div id="tab-draft" class="tab-content">
            <!-- Seção superior: roleta + controles -->
            <div class="draft-top-section">
                <!-- Roleta para sorteio de equipes -->
                <div class="draft-wheel-box">
                    <div class="draft-wheel-container">
                        <div class="draft-wheel-pointer"></div>
                        <canvas id="draft-wheel-canvas" width="1000" height="1000"></canvas>
                    </div>
                    <div style="margin-top: 1.5rem; text-align: center;">
                        <span style="color: var(--muted-foreground); font-size: 0.8rem;">Sorteado:</span>
                        <div id="draft-winner-name" style="font-size: 1.5rem; font-weight: 800; color: var(--primary);">
                            ---</div>
                    </div>
                </div>

                <!-- Painel de controles do draft -->
                <div class="draft-controls">
                    <!-- Cartão: Adicionar Equipe -->
                    <div class="card">
                        <h2><i data-lucide="users"></i> Adicionar Equipe</h2>
                        <!-- Input + botões Add e BYE -->
                        <div style="display: flex; gap: 0.5rem; margin-bottom: 1rem;">
                            <input type="text" id="draft-team-input" placeholder="Nome da equipe/jogador..."
                                style="flex: 1; padding: 0.75rem; border-radius: 8px; border: 1px solid var(--border); background: var(--background); color: var(--foreground); outline: none;">
                            <button type="button" id="btn-add-team"
                                style="background: var(--surface-hover); color: var(--foreground); border: 1px solid var(--border); padding: 0 1rem; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s;">Add</button>
                            <button type="button" id="btn-add-bye"
                                style="background: rgba(82, 82, 91, 0.2); color: #a1a1aa; border: 1px dashed #52525b; padding: 0 0.5rem; border-radius: 8px; cursor: pointer; transition: 0.2s;"
                                title="Adicionar vaga BYE (Passa Direto)">+ BYE</button>
                        </div>
                        <!-- Lista de equipes na pool -->
                        <div id="teams-container" class="teams-list"
                            style="display: flex; flex-direction: column; gap: 0.5rem; max-height: 200px; overflow-y: auto; padding-right: 0.5rem;">
                            <div style="color: #71717a; font-size: 0.85rem; text-align: center;">Vazio</div>
                        </div>
                        <!-- Botões Reiniciar e Apagar -->
                        <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
                            <button type="button" id="btn-restart-tourney" class="btn-action btn-restart"
                                title="Mantém os nomes, mas zera as chaves">
                                <i data-lucide="rotate-ccw" style="width: 16px;"></i> Reiniciar
                            </button>
                            <button type="button" id="btn-clear-all" class="btn-action btn-delete"
                                title="Apaga todos os nomes e as chaves">
                                <i data-lucide="trash-2" style="width: 16px;"></i> Apagar
                            </button>
                        </div>
                    </div>

                    <!-- Cartão: Ação (sorteio e tamanho da chave) -->
                    <div class="card">
                        <h2><i data-lucide="zap"></i> Ação</h2>

                        <!-- Seletor de tamanho da chave (4, 8, 16) -->
                        <div style="display: flex; gap: 0.5rem; margin-bottom: 1rem; align-items: center;">
                            <label
                                style="font-size: 0.85rem; color: var(--muted-foreground); font-weight: 500;">Tamanho:</label>
                            <select id="bracket-size-select"
                                style="flex: 1; padding: 0.5rem; border-radius: 6px; border: 1px solid var(--border); background: var(--background); color: var(--foreground); outline: none;">
                                <option value="4">4 Equipes</option>
                                <option value="8" selected>8 Equipes</option>
                                <option value="16">16 Equipes</option>
                            </select>
                        </div>

                        <!-- Botão principal: Sortear Vaga (gira a roleta) -->
                        <button id="draft-trigger-spin" class="spin-btn" disabled>
                            <i data-lucide="rotate-cw"></i> Sortear Vaga
                        </button>

                        <!-- Botões auxiliares: Auto e Instantâneo -->
                        <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem;">
                            <button type="button" id="btn-auto-draft" class="btn-action" disabled
                                style="flex: 1; background: rgba(168, 85, 247, 0.1); border: 1px dashed #a855f7; color: #a855f7; border-radius: 8px; padding: 0.5rem; cursor: pointer; transition: 0.2s;">
                                <i data-lucide="bot" style="width: 16px;"></i> Auto
                            </button>
                            <button type="button" id="btn-instant-draft" class="btn-action" disabled
                                style="flex: 1; background: rgba(59, 130, 246, 0.1); border: 1px dashed #3b82f6; color: #3b82f6; border-radius: 8px; padding: 0.5rem; cursor: pointer; transition: 0.2s;">
                                <i data-lucide="zap" style="width: 16px;"></i> Instant.
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!--
              ============================================================
              BRACKET WRAPPER (Árvore de Chaves)
              Controles de zoom no canto superior direito + viewport.
              Conteúdo gerado dinamicamente via JS (renderBracket).
              ============================================================
            -->
            <section class="bracket-wrapper">

                <!-- Controles de Zoom (+ / reset / -) -->
                <div class="zoom-controls">
                    <button class="btn-zoom" id="btn-zoom-out" title="Afastar (-)"><i data-lucide="zoom-out"
                            style="width: 20px;"></i></button>
                    <button class="btn-zoom" id="btn-zoom-reset" title="Restaurar Padrão"><i data-lucide="maximize"
                            style="width: 20px;"></i></button>
                    <button class="btn-zoom" id="btn-zoom-in" title="Aproximar (+)"><i data-lucide="zoom-in"
                            style="width: 20px;"></i></button>
                </div>

                <!-- Viewport: área com scroll e arrasto (pan) -->
                <div class="bracket-viewport" id="bracket-viewport">

                    <!-- Conteúdo escalável (zoom aplicado via transform: scale) -->
                    <div class="bracket-scale-content" id="bracket-content">
                        <!-- Preenchido via JS (renderBracketStructure) -->
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!--
      ============================================================
      SCRIPT PRINCIPAL (ES Module)
      Importa Firebase, define dados dos modos, lógica de abas,
      renderização manual, roleta, draft, e comunicação com overlay.
      ============================================================
    -->
    <script type="module">
        // Importa funções do Firebase (configurado em firebase-config.js)
        import { db, ref, set, onValue } from './firebase-config.js';

        /*
          ==========================================================
          BANCO DE DADOS DE MODOS (cartas padrão)
          Cada modo tem: id, nome, categoria, cor, nome do arquivo
          de imagem e ícone Lucide associado.
          ==========================================================
        */
        const defaultModosData = [
            /*
              Categoria: Especiais
              Modos especiais/aleatórios que não se encaixam em classes/lanes.
            */
            { id: 'bot', nome: 'Substituído por Bot', cat: 'Especiais', color: '#f87171', img: 'CARTA_DO_ROBO-substituido_por_boot.jpeg', icon: 'bot' },
            { id: 'impostor', nome: 'Impostor', cat: 'Especiais', color: '#fb923c', img: 'DEIXA_QUE_EU_ESCOLHO-impostor.jpeg', icon: 'user-x' },
            { id: 'capitao', nome: 'Capitão Escolhe', cat: 'Especiais', color: '#fbbf24', img: 'deixa_que_eu_escolho.jpeg', icon: 'crown' },

            /*
              Categoria: Classes
              Restringem o time a uma única classe de herói.
            */
            { id: 'apenas-magos', nome: 'Apenas Magos', cat: 'Classes', color: '#818cf8', img: 'APENAS_UNICO(A)-apenas-magos.jpeg', icon: 'wand-2' },
            { id: 'apenas-suporte', nome: 'Apenas Suporte', cat: 'Classes', color: '#f472b6', img: 'APENAS_UNICO(A)-apenas-suporte.jpeg', icon: 'heart-handshake' },
            { id: 'classe-atirador', nome: 'Classe Atirador', cat: 'Classes', color: '#4ade80', img: 'APENAS_UNICO(A)-classe_atirador.jpeg', icon: 'crosshair' },
            { id: 'classe-mago', nome: 'Classe Mago', cat: 'Classes', color: '#60a5fa', img: 'APENAS_UNICO(A)-classe_mago.jpeg', icon: 'sparkles' },
            { id: 'classe-tank', nome: 'Classe Tank', cat: 'Classes', color: '#9ca3af', img: 'APENAS_UNICO(A)-classe_tank.jpeg', icon: 'shield' },

            /*
              Categoria: Lanes
              Determinam em qual lane o time deve jogar.
            */
            { id: 'lane-mid', nome: 'Lane Mid', cat: 'Lanes', color: '#c084fc', img: 'APENAS_UNICO(A)-lane_mid.jpeg', icon: 'map' },
            { id: 'lane-ouro', nome: 'Lane Ouro', cat: 'Lanes', color: '#fbbf24', img: 'APENAS_UNICO(A)-lane_ouro.jpeg', icon: 'coins' },
            { id: 'lane-xp', nome: 'Lane XP', cat: 'Lanes', color: '#f87171', img: 'APENAS_UNICO(A)-lane_xp.jpeg', icon: 'swords' },

            /*
              Categoria: Proibições
              Impedem o uso de certos feitiços, lanes ou mecânicas.
            */
            { id: 'proibido-executar', nome: 'Proibido Executar', cat: 'Proibições', color: '#ef4444', img: 'EU_PROIBO-feitiço-executar.jpeg', icon: 'ban' },
            { id: 'proibido-petrificar', nome: 'Proibido Petrificar', cat: 'Proibições', color: '#ef4444', img: 'EU_PROIBO-feitiço-petrificar.jpeg', icon: 'ban' },
            { id: 'proibido-smite', nome: 'Proibido Smite', cat: 'Proibições', color: '#ef4444', img: 'EU_PROIBO-feitiço-smite.jpeg', icon: 'ban' },
            { id: 'proibido-flash', nome: 'Proibido Flash', cat: 'Proibições', color: '#ef4444', img: 'EU_PROIBO-feito-flash.jpeg', icon: 'ban' },
            { id: 'mid-bloqueada', nome: 'Mid Bloqueada', cat: 'Proibições', color: '#4b5563', img: 'EU_PROIBO-lane_mid_bloqueada.jpeg', icon: 'lock' },
            { id: 'ouro-bloqueada', nome: 'Ouro Bloqueada', cat: 'Proibições', color: '#4b5563', img: 'EU_PROIBO-lane_ouro.jpeg', icon: 'lock' },
            { id: 'xp-bloqueada', nome: 'XP Bloqueada', cat: 'Proibições', color: '#4b5563', img: 'EU_PROIBO-lane_xp.jpeg', icon: 'lock' },
            { id: 'lord-proibido', nome: 'Lord Proibido', cat: 'Proibições', color: '#7c2d12', img: 'EU_PROIBO-lord.jpeg', icon: 'skull' },
            { id: 'suportes-banidos', nome: 'Suportes Banidos', cat: 'Proibições', color: '#991b1b', img: 'EU_PROIBO-suportes_banidos.jpeg', icon: 'user-minus' },
            { id: 'tanks-banidos', nome: 'Tanks Banidos', cat: 'Proibições', color: '#991b1b', img: 'EU_PROIBO-tanks_banidos.jpeg', icon: 'user-minus' },
            { id: 'sem-comunicacao', nome: 'Sem Comunicação', cat: 'Proibições', color: '#ef4444', img: 'EU_PROIBO-comunicação.jpeg', icon: 'mic-off' }
        ];

        /*
          Arrays para gerenciar modos:
          - customModosData: cartas criadas pelo usuário (vindas do Firebase)
          - fullModosData: junção de defaultModosData + customModosData
        */
        let customModosData = [];
        let fullModosData = [...defaultModosData];

        /*
          Mapa de ícones Lucide para cada categoria.
          Usado no título dos cartões da seleção manual.
        */
        const catIcons = { 'Especiais': 'star', 'Classes': 'swords', 'Lanes': 'map', 'Proibições': 'shield-alert', 'Custom': 'layers' };

        /*
          activeRoletaModos: modos atualmente selecionados para aparecer na roleta.
          isSpinning: trava para evitar múltiplos giros simultâneos.
        */
        let activeRoletaModos = [...fullModosData];
        let isSpinning = false;

        /*
          ==========================================================
          SWITCH TAB (Troca de Abas)
          Atualiza classes, título, e dispara renderizações específicas.
          ==========================================================
        */
        window.switchTab = (tab) => {
            // Oculta todos os conteúdos e desativa todos os botões
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

            // Ativa a aba selecionada
            document.getElementById(`tab-${tab}`).classList.add('active');
            event.currentTarget.classList.add('active');

            // Mapa de títulos para cada aba
            const titles = {
                'manual': 'Seleção Manual',
                'roleta': 'Roleta Sincronizada',
                'draft': 'Draft MLBB',
                'add': 'Criar Nova Carta'
            };
            document.getElementById('tab-title').innerText = titles[tab] || 'Dashboard';

            // Renderiza componentes específicos ao trocar para roleta/draft
            if (tab === 'roleta') drawWheel();
            if (tab === 'draft') {
                drawDraftWheel();
                renderBracket();
            }
        };

        /*
          ==========================================================
          RENDER MANUAL CARDS (Seleção Manual)
          Renderiza grid de categorias com botões de modo.
          Cada categoria vira um cartão, cada modo vira um botão.
          ==========================================================
        */
        const manualContainer = document.getElementById('manual-container');

        function renderManualCards() {
            // Limpa o container
            manualContainer.innerHTML = '';

            // Obtém lista única de categorias a partir dos modos
            const cats = [...new Set(fullModosData.map(m => m.cat))];

            // Para cada categoria, cria um cartão
            cats.forEach(cat => {
                const card = document.createElement('div');
                card.className = 'cat-card';
                card.innerHTML = `<h3 class="cat-title"><i data-lucide="${catIcons[cat] || 'package'}"></i> ${cat}</h3>`;

                // Filtra modos da categoria atual e cria botões
                fullModosData.filter(m => m.cat === cat).forEach(modo => {
                    const btn = document.createElement('button');
                    btn.className = 'mode-btn';
                    btn.id = `manual-${modo.id}`;

                    // Verifica se é um card customizado (prefixo "custom_")
                    // Se for, adiciona botão de deletar (lixeira) ao lado do nome
                    const isCustom = modo.id.startsWith('custom_');
                    const deleteHtml = isCustom ? `<span class="delete-card-btn" style="color:var(--danger); cursor:pointer; margin-left:auto; padding: 2px;" data-id="${modo.id}" title="Remover"><i data-lucide="trash-2" style="width:14px; height:14px;"></i></span>` : '';

                    btn.innerHTML = `
                        <div style="display:flex; align-items:center; gap:0.5rem; flex:1;" onclick="selectCard('${modo.id}', '${modo.nome}', '${modo.img}')">
                            <i data-lucide="${modo.icon || 'circle'}" style="width:14px; opacity:0.6;"></i>
                            <span>${modo.nome}</span>
                        </div>
                        ${deleteHtml}
                        <i data-lucide="check" class="check-icon" style="width:14px;"></i>
                    `;
                    card.appendChild(btn);
                });
                manualContainer.appendChild(card);
            });

            // Adiciona evento de clique aos botões de deletar cartas customizadas
            document.querySelectorAll('.delete-card-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation(); // Impede que o clique selecione a carta
                    const idToRemove = e.currentTarget.getAttribute('data-id');
                    if (confirm('Tem certeza que deseja excluir esta carta?')) {
                        // Remove do Firebase
                        set(ref(db, 'custom_cards/' + idToRemove), null);
                        // Se a carta estava ativa na roleta, remove também da config
                        const cb = document.querySelector(`.roleta-cb[value="${idToRemove}"]`);
                        if (cb && cb.checked) {
                            const newActiveIds = activeRoletaModos.filter(m => m.id !== idToRemove).map(m => m.id);
                            set(ref(db, 'roleta_config/active_modes'), newActiveIds);
                        }
                    }
                });
            });

            // Atualiza ícones Lucide após inserir novo HTML
            if (window.lucide) window.lucide.createIcons();
        }

        /*
          ==========================================================
          SELECT CARD (Selecionar Carta Manualmente)
          Envia os dados da carta selecionada para o Firebase (nó "showcase"),
          o que faz o overlay externo exibir a carta.
          ==========================================================
        */
        window.selectCard = function (id, nome, img) {
            set(ref(db, 'showcase'), {
                modo_id: id,
                modo_atual: nome,
                imagem_url: 'assets/' + img,
                status_exibicao: 'visivel'
            });
        };

        /*
          ==========================================================
          FIREBASE LISTENER: CUSTOM CARDS
          Escuta o nó "custom_cards" no Realtime Database.
          Quando cartas são adicionadas/removidas, atualiza os arrays
          e re-renderiza a interface.
          ==========================================================
        */
        onValue(ref(db, 'custom_cards'), (snapshot) => {
            const data = snapshot.val();
            // Converte objeto Firebase em array (ou array vazio se null)
            customModosData = data ? Object.values(data) : [];
            // Junta modos padrão + customizados
            fullModosData = [...defaultModosData, ...customModosData];

            // Re-sincroniza a roleta com os modos ativos salvos no Firebase
            onValue(ref(db, 'roleta_config/active_modes'), (snapActive) => {
                const ids = snapActive.val();
                // Filtra fullModosData para manter apenas os IDs ativos
                activeRoletaModos = ids ? fullModosData.filter(m => ids.includes(m.id)) : [...fullModosData];
                // Atualiza checkboxes para refletir o estado salvo
                document.querySelectorAll('.roleta-cb').forEach(cb => cb.checked = ids ? ids.includes(cb.value) : true);
                drawWheel();
            }, { onlyOnce: true }); // onlyOnce para não ficar em loop com o listener abaixo

            // Re-renderiza interface manual e grid da roleta
            renderManualCards();
            renderRoletaGrid();
        });

        /*
          ==========================================================
          ADD CUSTOM CARD (Criar Nova Carta)
          Captura o submit do formulário e salva a nova carta no Firebase.
          ==========================================================
        */
        document.getElementById('add-card-form').addEventListener('submit', (e) => {
            e.preventDefault(); // Previne reload da página

            // Obtém valores dos campos
            const name = document.getElementById('new-card-name').value.trim();
            const img = document.getElementById('new-card-img').value.trim();
            const cat = document.getElementById('new-card-cat').value;
            const color = document.getElementById('new-card-color').value;

            // Validação básica
            if (!name || !img) return;

            // Gera ID único baseado em timestamp
            const cardId = 'custom_' + Date.now();
            const newCard = {
                id: cardId,
                nome: name,
                cat: cat,
                color: color,
                img: img,
                icon: 'star' // Ícone padrão para cartas customizadas
            };

            // Salva no Firebase
            set(ref(db, 'custom_cards/' + cardId), newCard).then(() => {
                // Ativa a nova carta na roleta por padrão
                const newActiveIds = [...activeRoletaModos.map(m => m.id), cardId];
                set(ref(db, 'roleta_config/active_modes'), newActiveIds);

                // Reseta o formulário para valores padrão
                document.getElementById('add-card-form').reset();
                document.getElementById('new-card-color').value = '#d4af37';

                alert('Carta adicionada com sucesso! Você pode visualizá-la na aba Manual.');
                switchTab('manual'); // Volta para a aba manual
            }).catch(err => {
                alert('Erro ao salvar no Firebase: ' + err.message);
            });
        });

        /*
          ==========================================================
          ROLETA (WHEEL) - LÓGICA DE DESENHO E GIRO
          Canvas para desenhar a roleta com fatias proporcionais.
          ==========================================================
        */
        const canvas = document.getElementById('wheel-canvas');
        const ctx = canvas.getContext('2d');

        /*
          drawWheel: desenha a roleta no canvas.
          Cada modo ativo vira uma fatia alternando cores de fundo
          (#18181b / #222226) com o texto na cor do modo.
        */
        function drawWheel() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = canvas.width / 2 - 10;

            // Se não há modos ativos, limpa o canvas e sai
            if (activeRoletaModos.length === 0) { ctx.clearRect(0, 0, canvas.width, canvas.height); return; }

            const sliceAngle = (2 * Math.PI) / activeRoletaModos.length;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Desenha cada fatia
            activeRoletaModos.forEach((modo, i) => {
                const angle = i * sliceAngle;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, angle, angle + sliceAngle);
                ctx.fillStyle = i % 2 === 0 ? '#18181b' : '#222226'; // Alterna cores
                ctx.fill();

                // Desenha o texto rotacionado no centro da fatia
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(angle + sliceAngle / 2);
                ctx.textAlign = 'right';
                ctx.fillStyle = modo.color || '#fff';
                ctx.font = 'bold 30px Inter';
                ctx.fillText(modo.nome, radius - 40, 10);
                ctx.restore();
            });
        }

        /*
          spinLocally: anima o giro da roleta para um modo específico.
          Calcula a rotação necessária para que o modo alvo pare
          no ponteiro (topo, 270 graus).
        */
        function spinLocally(targetId) {
            if (isSpinning) return; // Evita giros simultâneos
            isSpinning = true;

            // Encontra o índice do modo alvo
            const idx = activeRoletaModos.findIndex(m => m.id === targetId);
            // Giros extras (8-12) para parecer que girou várias voltas
            const extra = 8 + Math.floor(Math.random() * 5);
            const slice = 360 / activeRoletaModos.length;
            // Calcula rotação: voltas extras + alinhamento com o ponteiro (270°)
            const rot = (extra * 360) + (270 - (idx * slice) - (slice / 2));

            // Aplica a rotação via CSS transform (transição animada)
            canvas.style.transform = `rotate(${rot}deg)`;

            // Após 2s (duração da transição), exibe o resultado
            setTimeout(() => {
                isSpinning = false;
                document.getElementById('winner-name').innerText = activeRoletaModos[idx].nome;
                document.getElementById('winner-name').style.color = activeRoletaModos[idx].color;
            }, 2000);
        }

        /*
          Evento do botão "Girar Roleta":
          - Escolhe um modo aleatório
          - Anima o giro localmente
          - Envia comando para o Firebase (para sincronizar overlay)
        */
        document.getElementById('trigger-spin').onclick = () => {
            if (activeRoletaModos.length === 0) return alert("Selecione modos!");
            const winner = activeRoletaModos[Math.floor(Math.random() * activeRoletaModos.length)];
            spinLocally(winner.id);
            set(ref(db, 'roleta_command'), { command: 'spin', targetId: winner.id, timestamp: Date.now() });
        };

        /*
          ==========================================================
          ZOOM E PAN (Arrastar a Árvore de Chaves)
          Permite aumentar/diminuir zoom e arrastar o viewport.
          ==========================================================
        */
        const bracketContent = document.getElementById('bracket-content');
        const bracketViewport = document.getElementById('bracket-viewport');
        let currentZoom = 1;

        // Eventos dos botões de zoom (+/-/reset)
        document.getElementById('btn-zoom-in').addEventListener('click', () => { setZoom(currentZoom + 0.15); });
        document.getElementById('btn-zoom-out').addEventListener('click', () => { setZoom(currentZoom - 0.15); });
        document.getElementById('btn-zoom-reset').addEventListener('click', () => {
            setZoom(1);
            bracketViewport.scrollTo({ top: 0, left: 0, behavior: 'smooth' });
        });

        /*
          setZoom: aplica escala ao conteúdo e ajusta a largura
          para que a barra de rolagem funcione corretamente.
          Limites: 40% (mín) a 150% (máx).
        */
        function setZoom(newZoom) {
            currentZoom = Math.max(0.4, Math.min(newZoom, 1.5));
            bracketContent.style.transform = `scale(${currentZoom})`;
            // Compensa a largura para o scroll funcionar com zoom
            bracketContent.style.width = `${100 / currentZoom}%`;
        }

        /*
          Sistema de arrasto (Pan) com mouse:
          - mousedown: inicia arrasto, guarda posição inicial
          - mousemove: calcula deslocamento e atualiza scroll
          - mouseup/mouseleave: finaliza arrasto
        */
        let isDragging = false;
        let startX, startY, scrollLeft, scrollTop;

        bracketViewport.addEventListener('mousedown', (e) => {
            isDragging = true;
            bracketViewport.style.cursor = 'grabbing';
            startX = e.pageX - bracketViewport.offsetLeft;
            startY = e.pageY - bracketViewport.offsetTop;
            scrollLeft = bracketViewport.scrollLeft;
            scrollTop = bracketViewport.scrollTop;
        });

        bracketViewport.addEventListener('mouseleave', () => { isDragging = false; bracketViewport.style.cursor = 'grab'; });
        bracketViewport.addEventListener('mouseup', () => { isDragging = false; bracketViewport.style.cursor = 'grab'; });

        bracketViewport.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            const x = e.pageX - bracketViewport.offsetLeft;
            const y = e.pageY - bracketViewport.offsetTop;
            const walkX = (x - startX) * 1.5; // Multiplicador de velocidade
            const walkY = (y - startY) * 1.5;
            bracketViewport.scrollLeft = scrollLeft - walkX;
            bracketViewport.scrollTop = scrollTop - walkY;
        });

        /*
          ==========================================================
          TAMANHOS DE CHAVE (4, 8, 16 equipes)
          Controla o tamanho do bracket e persiste em localStorage.
          ==========================================================

        let DRAFT_MAX_TEAMS = currentBracketSize;
        document.getElementById('bracket-size-select').value = currentBracketSize;

            const newSize = parseInt(e.target.value);
            if (confirm("Mudar o tamanho da chave apagará o torneio atual e os times. Continuar?")) {
                currentBracketSize = newSize;
                DRAFT_MAX_TEAMS = newSize;
                localStorage.setItem('mlbb_bracket_size', newSize);

            } else {

        /*

                };
                dOrder = [
                    { m: 'W1', s: 't1' }, { m: 'W1', s: 't2' }, { m: 'W2', s: 't1' }, { m: 'W2', s: 't2' },
                    { m: 'W3', s: 't1' }, { m: 'W3', s: 't2' }, { m: 'W4', s: 't1' }, { m: 'W4', s: 't2' }
                ];
            } else if (size === 16) {
