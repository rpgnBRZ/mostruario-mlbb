                    L7: { name: "L-R2 (3)", t1: null, t2: null, w: { m: 'L10', s: 't1' }, l: null, winnerSlot: null },
                    L8: { name: "L-R2 (4)", t1: null, t2: null, w: { m: 'L10', s: 't2' }, l: null, winnerSlot: null },

                    L9: { name: "L-R3 (1)", t1: null, t2: null, w: { m: 'L11', s: 't2' }, l: null, winnerSlot: null },
                    L10: { name: "L-R3 (2)", t1: null, t2: null, w: { m: 'L12', s: 't2' }, l: null, winnerSlot: null },

                    L11: { name: "L-Quartas 1", t1: null, t2: null, w: { m: 'L13', s: 't1' }, l: null, winnerSlot: null },
                    L12: { name: "L-Quartas 2", t1: null, t2: null, w: { m: 'L13', s: 't2' }, l: null, winnerSlot: null },

                    L13: { name: "L-Semi", t1: null, t2: null, w: { m: 'L14', s: 't2' }, l: null, winnerSlot: null },
                    L14: { name: "Final Inferior", t1: null, t2: null, w: { m: 'GF', s: 't2' }, l: null, winnerSlot: null },
                    GF: { name: "Grande Final", t1: null, t2: null, w: null, l: null, winnerSlot: null }
                };
                dOrder = [
                    { m: 'W1', s: 't1' }, { m: 'W1', s: 't2' }, { m: 'W2', s: 't1' }, { m: 'W2', s: 't2' },
                    { m: 'W3', s: 't1' }, { m: 'W3', s: 't2' }, { m: 'W4', s: 't1' }, { m: 'W4', s: 't2' },
                    { m: 'W5', s: 't1' }, { m: 'W5', s: 't2' }, { m: 'W6', s: 't1' }, { m: 'W6', s: 't2' },
                    { m: 'W7', s: 't1' }, { m: 'W7', s: 't2' }, { m: 'W8', s: 't1' }, { m: 'W8', s: 't2' }
                ];
            }
            return { mData, dOrder };
        }

        /*
          ==========================================================
          ESTADO DO DRAFT (persistido em localStorage)
          ==========================================================
          - initialTeams: lista original de equipes (para reiniciar)
          - poolTeams: equipes ainda não sorteadas
          - drawnTeamsCount: quantas já foram sorteadas
          - matchData: estado atual de todas as partidas do bracket
          - drawOrder: ordem em que os slots da chave superior são preenchidos
        */
        let initialTeams = JSON.parse(localStorage.getItem('mlbb_initial_teams')) || [];
        let poolTeams = JSON.parse(localStorage.getItem('mlbb_pool_teams')) || [];
        let drawnTeamsCount = parseInt(localStorage.getItem('mlbb_drawn_count')) || 0;
        let matchData = JSON.parse(localStorage.getItem('mlbb_match_data')) || JSON.parse(JSON.stringify(getBracketTemplates(currentBracketSize).mData));
        let drawOrder = getBracketTemplates(currentBracketSize).dOrder;

        /*
          saveDraftState: persiste todo o estado do draft no localStorage
          para que sobreviva a refreshes da página.
        */
        function saveDraftState() {
            localStorage.setItem('mlbb_initial_teams', JSON.stringify(initialTeams));
            localStorage.setItem('mlbb_pool_teams', JSON.stringify(poolTeams));
            localStorage.setItem('mlbb_drawn_count', drawnTeamsCount.toString());
            localStorage.setItem('mlbb_match_data', JSON.stringify(matchData));
        }

        /*
          Botão "Reiniciar": mantém os times mas zera chaves e resultados.
          Devolve os times para a pool de sorteio.
        */
        document.getElementById('btn-restart-tourney').addEventListener('click', () => {
            if (initialTeams.length === 0) return alert("Não há equipes salvas para reiniciar um torneio.");
            if (confirm("Isso vai apagar os resultados das chaves e devolver os times originais para a roleta. Continuar?")) {
                poolTeams = JSON.parse(JSON.stringify(initialTeams));
                matchData = JSON.parse(JSON.stringify(getBracketTemplates(currentBracketSize).mData));
                drawOrder = getBracketTemplates(currentBracketSize).dOrder;
                drawnTeamsCount = 0;
                draftWinnerName.innerText = "---";
                draftWinnerName.style.color = "var(--primary)";
                saveDraftState();
                atualizarRoletaDraftUI();
                set(ref(db, 'bracket_data'), { state: matchData, timestamp: Date.now() });
            }
        });

        /*
          Botão "Apagar": remove todos os times e reseta as chaves.
        */
        document.getElementById('btn-clear-all').addEventListener('click', () => {
            if (confirm("ATENÇÃO: Isso vai excluir todos os times da roleta e apagar o torneio atual. Continuar?")) {
                initialTeams = [];
                poolTeams = [];
                drawnTeamsCount = 0;
                matchData = JSON.parse(JSON.stringify(getBracketTemplates(currentBracketSize).mData));
                drawOrder = getBracketTemplates(currentBracketSize).dOrder;
                draftWinnerName.innerText = "---";
                draftWinnerName.style.color = "var(--primary)";
                saveDraftState();
                atualizarRoletaDraftUI();
                set(ref(db, 'bracket_data'), { state: matchData, timestamp: Date.now() });
            }
        });

        /*
          Botão "Add": adiciona uma nova equipe à lista.
          Cada equipe recebe um ID único e uma cor da paleta (cíclica).
        */
        document.getElementById('btn-add-team').addEventListener('click', (e) => {
            e.preventDefault();
            const val = draftTeamInput.value.trim();
            if (!val) return;
            if (initialTeams.length >= DRAFT_MAX_TEAMS) return alert(`Limite de ${DRAFT_MAX_TEAMS} times!`);

            const newTeam = {
                id: 'team_' + Date.now(),
                nome: val,
                color: draftColors[(initialTeams.length) % draftColors.length]
            };

            initialTeams.push(newTeam);
            poolTeams.push(newTeam);
            draftTeamInput.value = '';

            saveDraftState();
            atualizarRoletaDraftUI();
        });

        /*
          Botão "+ BYE": adiciona uma vaga BYE (passe direto).
          Times BYE são avançados automaticamente (advanceByes).
        */
        document.getElementById('btn-add-bye').addEventListener('click', (e) => {
            e.preventDefault();
            if (initialTeams.length >= DRAFT_MAX_TEAMS) return alert(`Limite de ${DRAFT_MAX_TEAMS} times!`);

            const byeTeam = {
                id: 'bye_' + Date.now(),
                nome: 'BYE',
                color: '#52525b',
                isBye: true
            };

            initialTeams.push(byeTeam);
            poolTeams.push(byeTeam);

            saveDraftState();
            atualizarRoletaDraftUI();
        });

        /*
          Enter no input de equipe dispara o clique do botão Add.
        */
        draftTeamInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('btn-add-team').click(); });

        /*
          atualizarRoletaDraftUI:
          Atualiza a lista visual de equipes, habilita/desabilita botões,
          redesenha a roleta e o bracket.
        */
        function atualizarRoletaDraftUI() {
            const container = document.getElementById('teams-container');
            // Se não há times, mostra mensagem "Vazio"
            container.innerHTML = poolTeams.length ? '' : '<div style="color: #71717a; text-align: center; font-size: 0.85rem;">Vazio</div>';

            // Renderiza cada time na lista
            poolTeams.forEach((t) => {
                container.innerHTML += `
                    <div style="background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 0.5rem 0.75rem; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem;">
                        <span style="font-weight: 600; color: ${t.color}">${t.nome}</span>
                        <button onclick="removerTime('${t.id}')" style="background:none; border:none; color:#ef4444; cursor:pointer; font-weight:bold;">X</button>
                    </div>`;
            });

            // Botão "Sortear Vaga" desabilitado se não há times ou já sorteou todos
            draftTriggerSpin.disabled = poolTeams.length === 0 || drawnTeamsCount >= DRAFT_MAX_TEAMS;
            drawDraftWheel();
            renderBracket();
        }

        /*
          removerTime: remove um time da pool E da lista inicial.
          Chamado pelo botão "X" ao lado de cada time.
        */
        window.removerTime = function (teamId) {
            poolTeams = poolTeams.filter(t => t.id !== teamId);
            initialTeams = initialTeams.filter(t => t.id !== teamId);
            saveDraftState();
            atualizarRoletaDraftUI();
        }

        /*
          drawDraftWheel: desenha a roleta de equipes no canvas.
          Se não há equipes, exibe texto "Adicione Equipes".
          Cada fatia tem a borda na cor da equipe.
        */
        function drawDraftWheel() {
            const centerX = draftCanvas.width / 2;
            const centerY = draftCanvas.height / 2;
            const radius = draftCanvas.width / 2 - 10;
            draftCtx.clearRect(0, 0, draftCanvas.width, draftCanvas.height);

            // Estado vazio
            if (poolTeams.length === 0) {
                draftCtx.beginPath(); draftCtx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
                draftCtx.fillStyle = '#18181b'; draftCtx.fill(); draftCtx.strokeStyle = '#27272a'; draftCtx.lineWidth = 5; draftCtx.stroke();
                draftCtx.fillStyle = '#52525b'; draftCtx.font = 'bold 40px Inter'; draftCtx.textAlign = 'center';
                draftCtx.fillText('Adicione Equipes', centerX, centerY + 15);
                return;
            }

            // Desenha fatias para cada equipe
            const sliceAngle = (2 * Math.PI) / poolTeams.length;
            poolTeams.forEach((modo, i) => {
                const angle = i * sliceAngle;
                draftCtx.beginPath(); draftCtx.moveTo(centerX, centerY); draftCtx.arc(centerX, centerY, radius, angle, angle + sliceAngle);
                draftCtx.fillStyle = i % 2 === 0 ? '#18181b' : '#27272a'; draftCtx.fill();
                draftCtx.strokeStyle = modo.color; draftCtx.lineWidth = 2; draftCtx.stroke();

                // Texto rotacionado no centro da fatia
                draftCtx.save(); draftCtx.translate(centerX, centerY); draftCtx.rotate(angle + sliceAngle / 2);
                draftCtx.textAlign = 'right'; draftCtx.fillStyle = modo.color || '#fff'; draftCtx.font = 'bold 35px Inter';
                draftCtx.fillText(modo.nome, radius - 40, 12); draftCtx.restore();
            });
        }

        /*
          Evento do botão "Sortear Vaga":
          - Escolhe um time aleatório da pool
          - Anima o giro da roleta
          - Após 3s, coloca o time no próximo slot vazio do bracket
          - Salva estado e sincroniza com Firebase
        */
        draftTriggerSpin.onclick = () => {
            if (draftIsSpinning || poolTeams.length === 0) return;

            // Bloqueia interações durante o giro
            draftIsSpinning = true; draftTriggerSpin.disabled = true;
            draftTeamInput.disabled = true; document.getElementById('btn-add-team').disabled = true;

            // Sorteia um time aleatório
            const winnerIndex = Math.floor(Math.random() * poolTeams.length);
            const winner = poolTeams[winnerIndex];

            // Calcula rotação para animação (5-7 voltas extras)
            const extraSpins = 5 + Math.floor(Math.random() * 3);
            const sliceAngle = 360 / poolTeams.length;
            const targetRotation = (extraSpins * 360) + (270 - (winnerIndex * sliceAngle) - (sliceAngle / 2));

            // Acumula rotação para animação contínua
            draftCurrentRotation += targetRotation;
            draftCanvas.style.transform = `rotate(${draftCurrentRotation}deg)`;

            // Após 3s (fim da animação), processa o resultado
            setTimeout(() => {
                draftWinnerName.innerText = winner.nome;
                draftWinnerName.style.color = winner.color;

                // Coloca o time sorteado no próximo slot disponível
                const slot = drawOrder[drawnTeamsCount];
                matchData[slot.m][slot.s] = winner;

                // Remove da pool e incrementa contador
                poolTeams.splice(winnerIndex, 1);
                drawnTeamsCount++;

                saveDraftState();

                // Reseta a rotação do canvas para o próximo giro
                draftCanvas.style.transition = 'none'; draftCanvas.style.transform = `rotate(0deg)`; draftCurrentRotation = 0;
                set(ref(db, 'bracket_data'), { state: matchData, timestamp: Date.now() });

                // Re-renderiza e verifica BYEs
                setTimeout(() => {
                    draftCanvas.style.transition = 'transform 3s cubic-bezier(0.15, 0, 0.15, 1)';
                    atualizarRoletaDraftUI();

                    // Se todos os times foram sorteados, avança BYEs automaticamente
                    if (drawnTeamsCount >= DRAFT_MAX_TEAMS) advanceByes();

                    draftIsSpinning = false; draftTeamInput.disabled = false; document.getElementById('btn-add-team').disabled = false;
                }, 50);

            }, 3000);
        };

        /*
          setWinner: define o vencedor de uma partida.
          - clickedSlot: 't1' ou 't2' (qual time foi clicado)
          - Avança vencedor para a próxima chave (match.w)
          - Envia perdedor para a chave inferior (match.l)
          - Dispara advanceByes para processar BYEs automaticamente
        */
        window.setWinner = function (matchId, clickedSlot) {
            const match = matchData[matchId];
            // Só permite se ambos os times existirem e não houver vencedor ainda
            if (!match.t1 || !match.t2 || match.winnerSlot) return;

            const winnerTeam = match[clickedSlot];
            const loserSlot = clickedSlot === 't1' ? 't2' : 't1';
            const loserTeam = match[loserSlot];

            match.winnerSlot = clickedSlot;

            // Avança vencedor para o slot correspondente na próxima rodada
            if (match.w) matchData[match.w.m][match.w.s] = winnerTeam;
            // Envia perdedor para a chave inferior (se houver)
            if (match.l) matchData[match.l.m][match.l.s] = loserTeam;

            saveDraftState();
            set(ref(db, 'bracket_data'), { state: matchData, timestamp: Date.now() });
            renderBracket();

            // Verifica se a partida gerou confrontos contra BYE
            setTimeout(advanceByes, 200);
        }

        /*
          advanceByes: sistema de avanço automático de BYEs.
          Percorre todas as partidas: se uma tem BYE vs time real,
          o time real vence automaticamente.
          Se dois BYEs se enfrentam, o primeiro avança.
          Usa setTimeout recursivo até não haver mais BYEs a avançar.
        */
        function advanceByes() {
            let advanced = false;
            Object.keys(matchData).forEach(matchId => {
                const m = matchData[matchId];
                // Só processa partidas sem vencedor definido e com ambos os times
                if (!m.winnerSlot && m.t1 && m.t2) {
                    if (m.t1.isBye && !m.t2.isBye) {
                        window.setWinner(matchId, 't2');
                        advanced = true;
                    } else if (!m.t1.isBye && m.t2.isBye) {
                        window.setWinner(matchId, 't1');
                        advanced = true;
                    } else if (m.t1.isBye && m.t2.isBye) {
                        window.setWinner(matchId, 't1');
                        advanced = true;
                    }
                }
            });
            // Se algum BYE avançou, pode ter gerado novos confrontos BYE
            if (advanced) {
                setTimeout(advanceByes, 300);
            }
        }

        /*
          undoWinner: desfaz o resultado de uma partida.
          - Remove o vencedor e perdedor das chaves subsequentes
            (recursivamente via clearForward)
          - Permite redefinir o vencedor da partida
        */
        window.undoWinner = function (e, matchId) {
            e.stopPropagation(); // Impede acionar outros cliques (ex: setWinner)

            const match = matchData[matchId];
            if (!match.winnerSlot) return;

            /*
              clearForward: função recursiva que limpa um time
              de todas as partidas subsequentes na árvore.
            */
            function clearForward(mId, teamObj) {
                if (!teamObj || !mId) return;
                const m = matchData[mId];
                if (m.t1 && m.t1.id === teamObj.id) {
                    m.t1 = null;
                    if (m.winnerSlot === 't1') {
                        m.winnerSlot = null;
                        if (m.w) clearForward(m.w.m, teamObj);
                        if (m.l) clearForward(m.l.m, teamObj);
                    }
                }
                if (m.t2 && m.t2.id === teamObj.id) {
                    m.t2 = null;
                    if (m.winnerSlot === 't2') {
                        m.winnerSlot = null;
                        if (m.w) clearForward(m.w.m, teamObj);
                        if (m.l) clearForward(m.l.m, teamObj);
                    }
                }
            }

            const winnerTeam = match[match.winnerSlot];
            const loserSlot = match.winnerSlot === 't1' ? 't2' : 't1';
            const loserTeam = match[loserSlot];

            match.winnerSlot = null;
            // Limpa vencedor e perdedor das chaves seguintes
            if (match.w) clearForward(match.w.m, winnerTeam);
            if (match.l) clearForward(match.l.m, loserTeam);

            saveDraftState();
            set(ref(db, 'bracket_data'), { state: matchData, timestamp: Date.now() });
            renderBracket();
        }

        /*
          generateMatchHTML: gera o HTML de uma partida para o bracket.
          - Se ambos os times existem e não há vencedor, os slots são clicáveis
          - Se há vencedor, mostra destaque dourado + botão desfazer
        */
        function generateMatchHTML(matchId) {
            const match = matchData[matchId];
            const t1 = match.t1;
            const t2 = match.t2;
            // Só permite clicar se ambos os times existirem e não houver vencedor
            const canClick = t1 && t2 && !match.winnerSlot;

            // Botão "Desfazer" visível apenas no hover do slot vencedor
            const undoBtn1 = match.winnerSlot === 't1' ? `<button class="undo-btn" onclick="undoWinner(event, '${matchId}')" title="Desfazer Partida"><i data-lucide="undo-2" style="width: 14px; height: 14px;"></i></button>` : '';
            const undoBtn2 = match.winnerSlot === 't2' ? `<button class="undo-btn" onclick="undoWinner(event, '${matchId}')" title="Desfazer Partida"><i data-lucide="undo-2" style="width: 14px; height: 14px;"></i></button>` : '';

            return `
            <div class="match-box">
                <div class="match-name">${match.name}</div>
                <!-- Slot do Time 1 -->
                <div class="team-slot ${canClick ? 'clickable' : ''} ${match.winnerSlot === 't1' ? 'winner can-undo' : ''}" 
                     ${canClick ? `onclick="setWinner('${matchId}', 't1')"` : ''} 
                     style="color: ${t1 ? t1.color : '#a1a1aa'}">
                    <span>${t1 ? t1.nome : 'Aguardando...'}</span>
                    <div class="slot-actions">
                        ${undoBtn1}
                        ${match.winnerSlot === 't1' ? '<i data-lucide="check" class="check-icon-winner" style="width: 16px; color: var(--primary);"></i>' : ''}
                    </div>
                </div>
                <!-- Slot do Time 2 -->
                <div class="team-slot ${canClick ? 'clickable' : ''} ${match.winnerSlot === 't2' ? 'winner can-undo' : ''}" 
                     ${canClick ? `onclick="setWinner('${matchId}', 't2')"` : ''} 
                     style="color: ${t2 ? t2.color : '#a1a1aa'}">
                    <span>${t2 ? t2.nome : 'Aguardando...'}</span>
                    <div class="slot-actions">
                        ${undoBtn2}
                        ${match.winnerSlot === 't2' ? '<i data-lucide="check" class="check-icon-winner" style="width: 16px; color: var(--primary);"></i>' : ''}
                    </div>
                </div>
            </div>`;
        }

        /*
          renderBracketStructure: gera o HTML da estrutura de colunas do bracket.
          Cria as colunas para chave superior, chave inferior e grande final,
          de acordo com o tamanho (4, 8 ou 16 equipes).
          As partidas são inseridas depois por renderBracket().
        */
        function renderBracketStructure(size) {
            let html = '';
            if (size === 4) {
                // Chave Superior (4 equipes) -> 2 rodadas
                html += `<h2 class="section-title" style="color: var(--primary);">CHAVE SUPERIOR (VITÓRIA)</h2>
                <div style="display: flex; gap: 2rem; margin-bottom: 2rem; min-width: 400px; justify-content: center;">
                    <div class="round-col" id="col-w1"></div>
                    <div class="round-col" id="col-w2" style="justify-content: center;"></div>
                </div>
                <h2 class="section-title" style="color: #f87171; border-top: 2px dashed var(--border); padding-top: 2rem; margin-top: 2rem;">CHAVE INFERIOR (DERROTA)</h2>
                <div style="display: flex; gap: 2rem; min-width: 400px; justify-content: center;">
                    <div class="round-col" id="col-l1"></div>
                    <div class="round-col" id="col-l2" style="justify-content: center;"></div>
                </div>
                <div style="display: flex; justify-content: center; margin-top: 3rem; padding-top: 2rem; border-top: 2px solid var(--primary);">
                    <div class="round-col" id="col-gf"><h3 style="text-align:center; color: var(--primary); margin-bottom: 1rem; font-family: 'Outfit';">GRANDE FINAL</h3></div>
                </div>`;
            } else if (size === 8) {
                html += `<h2 class="section-title" style="color: var(--primary);">CHAVE SUPERIOR (VITÓRIA)</h2>
                <div style="display: flex; gap: 2rem; margin-bottom: 2rem; min-width: 800px; justify-content: center;">
                    <div class="round-col" id="col-w1"></div>
                    <div class="round-col" id="col-w2" style="justify-content: space-around;"></div>
                    <div class="round-col" id="col-w3" style="justify-content: center;"></div>
                </div>
                <h2 class="section-title" style="color: #f87171; border-top: 2px dashed var(--border); padding-top: 2rem; margin-top: 2rem;">CHAVE INFERIOR (DERROTA)</h2>
                <div style="display: flex; gap: 2rem; min-width: 800px; justify-content: center;">
                    <div class="round-col" id="col-l1" style="justify-content: space-around;"></div>
                    <div class="round-col" id="col-l2" style="justify-content: space-around;"></div>
                    <div class="round-col" id="col-l3" style="justify-content: center;"></div>
                    <div class="round-col" id="col-l4" style="justify-content: center;"></div>
                </div>
                <div style="display: flex; justify-content: center; margin-top: 3rem; padding-top: 2rem; border-top: 2px solid var(--primary);">
                    <div class="round-col" id="col-gf"><h3 style="text-align:center; color: var(--primary); margin-bottom: 1rem; font-family: 'Outfit';">GRANDE FINAL</h3></div>
                </div>`;
            } else if (size === 16) {
                html += `<h2 class="section-title" style="color: var(--primary);">CHAVE SUPERIOR (VITÓRIA)</h2>
                <div style="display: flex; gap: 2rem; margin-bottom: 2rem; min-width: 1200px; justify-content: center;">
                    <div class="round-col" id="col-w1"></div>
                    <div class="round-col" id="col-w2" style="justify-content: space-around;"></div>
                    <div class="round-col" id="col-w3" style="justify-content: space-around;"></div>
                    <div class="round-col" id="col-w4" style="justify-content: center;"></div>
                </div>
                <h2 class="section-title" style="color: #f87171; border-top: 2px dashed var(--border); padding-top: 2rem; margin-top: 2rem;">CHAVE INFERIOR (DERROTA)</h2>
                <div style="display: flex; gap: 2rem; min-width: 1200px; justify-content: center;">
                    <div class="round-col" id="col-l1" style="justify-content: space-around;"></div>
                    <div class="round-col" id="col-l2" style="justify-content: space-around;"></div>
                    <div class="round-col" id="col-l3" style="justify-content: space-around;"></div>
                    <div class="round-col" id="col-l4" style="justify-content: space-around;"></div>
                    <div class="round-col" id="col-l5" style="justify-content: center;"></div>
                    <div class="round-col" id="col-l6" style="justify-content: center;"></div>
                </div>
                <div style="display: flex; justify-content: center; margin-top: 3rem; padding-top: 2rem; border-top: 2px solid var(--primary);">
                    <div class="round-col" id="col-gf"><h3 style="text-align:center; color: var(--primary); margin-bottom: 1rem; font-family: 'Outfit';">GRANDE FINAL</h3></div>
                </div>`;
            }
            html += `<div style="display: flex; justify-content: center; margin-top: 3rem;"><button id="btn-print-bracket" class="btn-action" style="max-width: 250px; background: rgba(59, 130, 246, 0.1); border: 1px dashed #3b82f6; color: #3b82f6; padding: 1rem; font-size: 1rem;" title="Imprimir somente as chaves"><i data-lucide="printer" style="width: 20px;"></i> Imprimir Chaves</button></div>`;

            document.getElementById('bracket-content').innerHTML = html;
            document.getElementById('btn-print-bracket').addEventListener('click', () => window.print());
        }

        /*
          renderBracket: renderiza todo o bracket.
          Primeiro monta a estrutura (colunas) e depois insere
          as partidas geradas por generateMatchHTML.
        */
        function renderBracket() {
            renderBracketStructure(currentBracketSize);

            if (currentBracketSize === 4) {
                document.getElementById('col-w1').innerHTML = generateMatchHTML('W1') + generateMatchHTML('W2');
                document.getElementById('col-w2').innerHTML = generateMatchHTML('W3');
                document.getElementById('col-l1').innerHTML = generateMatchHTML('L1');
                document.getElementById('col-l2').innerHTML = generateMatchHTML('L2');
            } else if (currentBracketSize === 8) {
                document.getElementById('col-w1').innerHTML = generateMatchHTML('W1') + generateMatchHTML('W2') + generateMatchHTML('W3') + generateMatchHTML('W4');
                document.getElementById('col-w2').innerHTML = generateMatchHTML('W5') + generateMatchHTML('W6');
                document.getElementById('col-w3').innerHTML = generateMatchHTML('W7');
                document.getElementById('col-l1').innerHTML = generateMatchHTML('L1') + generateMatchHTML('L2');
                document.getElementById('col-l2').innerHTML = generateMatchHTML('L3') + generateMatchHTML('L4');
                document.getElementById('col-l3').innerHTML = generateMatchHTML('L5');
                document.getElementById('col-l4').innerHTML = generateMatchHTML('L6');
            } else if (currentBracketSize === 16) {
                document.getElementById('col-w1').innerHTML = generateMatchHTML('W1') + generateMatchHTML('W2') + generateMatchHTML('W3') + generateMatchHTML('W4') + generateMatchHTML('W5') + generateMatchHTML('W6') + generateMatchHTML('W7') + generateMatchHTML('W8');
                document.getElementById('col-w2').innerHTML = generateMatchHTML('W9') + generateMatchHTML('W10') + generateMatchHTML('W11') + generateMatchHTML('W12');
                document.getElementById('col-w3').innerHTML = generateMatchHTML('W13') + generateMatchHTML('W14');
                document.getElementById('col-w4').innerHTML = generateMatchHTML('W15');

                document.getElementById('col-l1').innerHTML = generateMatchHTML('L1') + generateMatchHTML('L2') + generateMatchHTML('L3') + generateMatchHTML('L4');
                document.getElementById('col-l2').innerHTML = generateMatchHTML('L5') + generateMatchHTML('L6') + generateMatchHTML('L7') + generateMatchHTML('L8');
                document.getElementById('col-l3').innerHTML = generateMatchHTML('L9') + generateMatchHTML('L10');
                document.getElementById('col-l4').innerHTML = generateMatchHTML('L11') + generateMatchHTML('L12');
                document.getElementById('col-l5').innerHTML = generateMatchHTML('L13');
                document.getElementById('col-l6').innerHTML = generateMatchHTML('L14');
            }

            document.getElementById('col-gf').innerHTML += generateMatchHTML('GF');
            lucide.createIcons();
        }

        /*
          ==========================================================
          FIREBASE SYNC - Roleta e Showcase
          Sincroniza checkboxes, roleta e status do overlay.
          ==========================================================
        */
        const roletaGrid = document.getElementById('roleta-selection-grid');

        /*
          renderRoletaGrid: renderiza os checkboxes de modos ativos
          na roleta. Cada checkbox salva as seleções no Firebase.
        */
        function renderRoletaGrid() {
            roletaGrid.innerHTML = '';
            fullModosData.forEach(modo => {
                const label = document.createElement('label');
                label.className = 'mode-item-cb';
                const isChecked = activeRoletaModos.some(m => m.id === modo.id) ? 'checked' : '';
                label.innerHTML = `
                    <input type="checkbox" ${isChecked} value="${modo.id}" class="roleta-cb">
                    <span>${modo.nome}</span>
                `;
                roletaGrid.appendChild(label);
            });

            // Evento onchange de cada checkbox: salva no Firebase
            document.querySelectorAll('.roleta-cb').forEach(cb => {
                cb.onchange = () => {
                    const ids = Array.from(document.querySelectorAll('.roleta-cb:checked')).map(el => el.value);
                    set(ref(db, 'roleta_config/active_modes'), ids);
                };
            });
        }

        /*
          Listener do Firebase: roleta_config/active_modes
          Mantém activeRoletaModos sincronizado com o banco.
        */
        onValue(ref(db, 'roleta_config/active_modes'), (snapshot) => {
            const ids = snapshot.val();
            activeRoletaModos = ids ? fullModosData.filter(m => ids.includes(m.id)) : [...fullModosData];
            document.querySelectorAll('.roleta-cb').forEach(cb => cb.checked = ids ? ids.includes(cb.value) : true);
            drawWheel();
        });

        /*
          Listener do Firebase: showcase
          Atualiza o status pill (visível/oculto) e destaca
          o modo ativo na seleção manual.
        */
        onValue(ref(db, 'showcase'), (snapshot) => {
            const data = snapshot.val();
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');

            if (data && data.status_exibicao === 'visivel') {
                statusDot.classList.add('active');
                statusText.innerText = 'Overlay Visível';
                // Encontra o modo correspondente no array e destaca
                const modo = fullModosData.find(m => (data.modo_id && m.id === data.modo_id) || (data.imagem_url && data.imagem_url.includes(m.img)) || m.nome === data.modo_atual);
                if (modo) document.getElementById(`manual-${modo.id}`)?.classList.add('active');
            } else {
                statusDot.classList.remove('active');
                statusText.innerText = 'Overlay Oculto';
            }
        });

        /*
          Botão "Esconder": oculta o overlay enviando status='oculto'
          para o Firebase (nó showcase).
        */
        document.getElementById('btn-hide-global').onclick = () => set(ref(db, 'showcase'), { status_exibicao: 'oculto' });

        /*
          ==========================================================
          BOTÕES INSTANT E AUTO DRAFT
          Funcionalidades avançadas para sortear todas as vagas
          de uma vez (Instant) ou automaticamente com intervalo (Auto).
          ==========================================================
        */
        const btnInstantDraft = document.getElementById('btn-instant-draft');
        const btnAutoDraft = document.getElementById('btn-auto-draft');
        let autoDraftInterval = null;
        let isAutoMode = false; // Flag para proteger o botão Auto de desabilitar

        /*
          Intercepta o giro manual para desabilitar os botões
          Instant e Auto temporariamente enquanto gira.
        */
        const originalDraftSpin = draftTriggerSpin.onclick;
        draftTriggerSpin.onclick = (e) => {
            if (originalDraftSpin) originalDraftSpin(e);

            btnInstantDraft.disabled = true;
            // Só bloqueia o botão Auto se não estiver no modo automático
            if (!isAutoMode) btnAutoDraft.disabled = true;
        };

        /*
          fillByesIfNeeded: preenche as vagas restantes com BYEs
          para completar o número máximo de equipes do bracket.
          Usado antes dos sorteios Instant e Auto.
        */
        function fillByesIfNeeded() {
            const needed = DRAFT_MAX_TEAMS - drawnTeamsCount - poolTeams.length;
            if (needed > 0) {
                for (let i = 0; i < needed; i++) {
                    const byeTeam = {
                        id: 'bye_' + Date.now() + '_' + i,
                        nome: 'BYE',
                        color: '#52525b',
                        isBye: true
                    };
                    poolTeams.push(byeTeam);
                    initialTeams.push(byeTeam);
                }
                saveDraftState();
                atualizarRoletaDraftUI();
            }
        }

        /*
          SORTEIO INSTANTÂNEO:
          Embaralha todos os times restantes (Fisher-Yates) e
          distribui diretamente nos slots, sem animação de roleta.
        */
        btnInstantDraft.addEventListener('click', () => {
            fillByesIfNeeded();
            if (poolTeams.length === 0 || draftIsSpinning || isAutoMode) return;

            // Bloqueia todas as interações durante o sorteio
            btnInstantDraft.disabled = true;
            btnAutoDraft.disabled = true;
            draftTriggerSpin.disabled = true;
            draftTeamInput.disabled = true;
            document.getElementById('btn-add-team').disabled = true;

            // Embaralha os times (algoritmo Fisher-Yates)
            let timesParaSortear = [...poolTeams];
            for (let i = timesParaSortear.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [timesParaSortear[i], timesParaSortear[j]] = [timesParaSortear[j], timesParaSortear[i]];
            }

            // Distribui cada time no próximo slot disponível
            timesParaSortear.forEach(winner => {
                if (drawnTeamsCount >= DRAFT_MAX_TEAMS) return;
                const slot = drawOrder[drawnTeamsCount];
                matchData[slot.m][slot.s] = winner;
                drawnTeamsCount++;
            });

            poolTeams = [];

            saveDraftState();
            set(ref(db, 'bracket_data'), { state: matchData, timestamp: Date.now() });
            atualizarRoletaDraftUI();

            draftWinnerName.innerText = "Sorteio Rápido!";
            draftWinnerName.style.color = "var(--success)";

            // Avança BYEs automaticamente
            setTimeout(advanceByes, 500);
        });

        /*
          SORTEIO AUTOMÁTICO:
          Gira a roleta automaticamente a cada ~1 segundo.
          - Primeiro clique: inicia o modo automático
          - Segundo clique: pausa o modo automático
          Quando todos os times são sorteados, para automaticamente.
        */
        btnAutoDraft.addEventListener('click', () => {
            fillByesIfNeeded();
            if (poolTeams.length === 0 || (draftIsSpinning && !isAutoMode)) return;

            // Se já estiver rodando, PAUSA
            if (isAutoMode) {
                isAutoMode = false;
                clearInterval(autoDraftInterval);
                autoDraftInterval = null;
                btnAutoDraft.innerHTML = `<i data-lucide="bot" style="width: 16px;"></i> Auto`;
                btnAutoDraft.style.borderColor = '#a855f7';
                btnAutoDraft.style.color = '#a855f7';
                lucide.createIcons();
                atualizarRoletaDraftUI();
                return;
            }

            // INICIA modo automático
            isAutoMode = true;
            btnAutoDraft.innerHTML = `<i data-lucide="pause" style="width: 16px;"></i> Parar`;
            btnAutoDraft.style.borderColor = '#ef4444';
            btnAutoDraft.style.color = '#ef4444';
            btnAutoDraft.disabled = false; // Mantém clicável para permitir pausar
            lucide.createIcons();

            btnInstantDraft.disabled = true;

            // Dispara o primeiro giro imediatamente
            if (!draftIsSpinning) draftTriggerSpin.click();

            // Loop que verifica a cada 1s se a roleta parou para girar de novo
            autoDraftInterval = setInterval(() => {
                if (poolTeams.length === 0 || drawnTeamsCount >= DRAFT_MAX_TEAMS) {
                    // Acabou: limpa o intervalo e volta ao estado normal
                    isAutoMode = false;
                    clearInterval(autoDraftInterval);
                    autoDraftInterval = null;
                    btnAutoDraft.innerHTML = `<i data-lucide="bot" style="width: 16px;"></i> Auto`;
                    btnAutoDraft.style.borderColor = '#a855f7';
                    btnAutoDraft.style.color = '#a855f7';
                    lucide.createIcons();
                    atualizarRoletaDraftUI();
                    return;
                }

                if (!draftIsSpinning && isAutoMode) {
                    draftTriggerSpin.click();
                }
            }, 1000);
        });

        /*
          Sobrescreve atualizarRoletaDraftUI para gerenciar
          corretamente o estado dos botões Instant e Auto.
        */
        const originalAtualizarRoleta = atualizarRoletaDraftUI;
        atualizarRoletaDraftUI = function () {
            originalAtualizarRoleta();

            setTimeout(() => {
                const disabledState = poolTeams.length === 0 || drawnTeamsCount >= DRAFT_MAX_TEAMS || draftIsSpinning;
                if (btnInstantDraft) btnInstantDraft.disabled = disabledState;

                // No modo automático, o botão Auto nunca desativa (para poder pausar)
                if (btnAutoDraft) {
                    btnAutoDraft.disabled = isAutoMode ? false : disabledState;
                }
            }, 100);
        };

        /*
          Botão "Imprimir Chaves": dispara window.print()
          que usa os estilos @media print para exibir só as chaves.
        */
        document.getElementById('btn-print-bracket').addEventListener('click', () => {
            window.print();
        });

        /*
          ==========================================================
          INICIALIZAÇÃO
          - Desenha a roleta
          - Renderiza a UI do draft
          - Cria os ícones Lucide
          ==========================================================
        */
        drawWheel();
        atualizarRoletaDraftUI();
        lucide.createIcons();
    </script>
</body>

</html>
