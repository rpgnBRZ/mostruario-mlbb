<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>MLBB Showcase - Minimalista</title>
    <style>
        /* --- CONFIGURAÇÃO GERAL DA PÁGINA --- */
        body {
            margin: 0;
            overflow: hidden;
            background-color: transparent; 
            display: flex;
            justify-content: center;
            align-items: center; 
            height: 100vh;
            font-family: sans-serif;
        }

        /* --- CONTAINER DA ANIMAÇÃO --- */
        #card-container {
            perspective: 1000px;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* --- ESTILO DA CARTA --- */
        .card {
            width: 350px;
            height: 500px;
            background-color: #222;
            border: 5px solid #d4af37;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
            
            background-size: cover;
            background-position: center;
            
            transform: rotateY(-90deg);
            transition: transform 0.8s ease-out;
            
            position: relative;
            overflow: hidden;
        }

        /* --- CONTROLE DE VISIBILIDADE --- */
        #card-container.visible {
            opacity: 1;
            transform: scale(1);
        }

        #card-container.visible .card {
            transform: rotateY(0deg);
        }

        /* --- EFEITO DE BRILHO (SHINE) --- */
        .card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -150%;
            width: 50%;
            height: 200%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 100%);
            transform: rotate(25deg);
            pointer-events: none;
        }

        #card-container.visible .card::after {
            animation: shine 3.5s infinite;
        }

        @keyframes shine {
            0% { left: -150%; }
            20% { left: 150%; }
            100% { left: 150%; }
        }
    </style>
</head>
<body>

    <div id="card-container">
        <div class="card"></div>
    </div>

    <script type="module">
        import { db, ref, onValue } from './firebase-config.js';

        const container = document.getElementById('card-container');
        const cardElement = document.querySelector('.card');
        const showcaseRef = ref(db, 'showcase');

        let imagemAtual = "";

        onValue(showcaseRef, (snapshot) => {
            const data = snapshot.val();
            
            if (data && data.status_exibicao === 'visivel' && data.imagem_url) {
                
                if (data.imagem_url !== imagemAtual) {
                    // 1. Esconde a carta
                    container.classList.remove('visible');

                    // 2. Troca a imagem escondido
                    setTimeout(() => {
                        cardElement.style.backgroundImage = `url('${data.imagem_url}')`;
                        imagemAtual = data.imagem_url;
                        
                        // 3. Mostra a carta (Agora sem tentar mexer em textos que não existem)
                        container.classList.add('visible');
                    }, 600); 

                } else {
                    container.classList.add('visible');
                }
            } else {
                container.classList.remove('visible');
                imagemAtual = "";
            }
        });
    </script>
</body>
</html>
