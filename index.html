<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>MLBB Showcase - Comentado</title>
    <style>
        /* --- CONFIGURAÇÃO GERAL DA PÁGINA --- */
        body {
            margin: 0;
            overflow: hidden; /* Garante que não apareçam barras de rolagem */
            background-color: transparent; /* Essencial para o fundo sumir no OBS */
            display: flex;
            justify-content: center; /* Centraliza a carta na horizontal */
            align-items: center;     /* Centraliza a carta na vertical */
            height: 100vh;           /* Faz o corpo ocupar a altura toda da tela */
            font-family: sans-serif;
        }

        /* --- CONTAINER DA ANIMAÇÃO (A "moldura" invisível) --- */
        #card-container {
            perspective: 1000px; /* Cria a profundidade para o efeito 3D ser real */
            opacity: 0;          /* Começa invisível */
            transform: scale(0.8); /* Começa levemente menor */
            /* Controla a velocidade de entrada (suavidade) */
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* --- ESTILO DA CARTA (Visual da borda e fundo) --- */
        .card {
            width: 350px;
            height: 500px;
            background-color: #222; /* Cor de fundo caso a imagem falhe */
            border: 5px solid #d4af37; /* A famosa borda dourada */
            border-radius: 15px; /* Arredondamento dos cantos */
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.5); /* Brilho (aura) ao redor da carta */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 30px;
            color: white;
            
            background-size: cover;    /* Faz a imagem preencher a carta toda */
            background-position: center; /* Centraliza a foto no fundo */
            
            /* Efeito inicial: virada de lado (-90 graus) */
            transform: rotateY(-90deg);
            transition: transform 0.8s ease-out; /* Velocidade do giro */
            
            position: relative;
            overflow: hidden; /* Garante que o brilho do efeito "Shine" não saia da carta */
        }

        /* --- ESTILOS DOS TEXTOS --- */
         h2 {
            font-size: 2.2em;
            margin: 0;
            color: #f1c40f; /* Cor amarela do título */
            text-transform: uppercase;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8); /* Sombra para ler melhor */
            z-index: 2; /* Garante que o texto fique acima de tudo */
        }

        .divider {
            width: 70%;
            height: 2px;
            background: #d4af37; /* Linha dourada divisória */
            margin: 15px 0;
            z-index: 2;
        }

        p {
            font-size: 1.3em;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.9);
            margin: 0;
            z-index: 2;
            font-weight: bold;
            color: white;
        }

        /* --- CONTROLE DE VISIBILIDADE (Ativado via JavaScript) --- */
        #card-container.visible {
            opacity: 1;      /* Torna visível */
            transform: scale(1); /* Volta para o tamanho original */
        }

        #card-container.visible .card {
            transform: rotateY(0deg); /* Faz a carta girar para a frente */
        }

        /* --- EFEITO DE BRILHO (SHINE) --- */
        .card::after {
            content: ''; /* Necessário para criar o elemento falso de luz */
            position: absolute;
            top: -50%;
            left: -150%; /* Começa bem longe na esquerda */
            width: 50%;
            height: 200%;
            /* Cria a faixa de luz branca transparente */
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 100%);
            transform: rotate(25deg); /* Inclina a faixa de luz */
            pointer-events: none; /* Garante que o brilho não atrapalhe cliques */
        }

        /* Ativa a animação de brilho apenas quando a carta está visível */
        #card-container.visible .card::after {
            animation: shine 3.5s infinite; /* Repete a cada 3.5 segundos */
        }

        /* Movimento do brilho atravessando a carta */
        @keyframes shine {
            0% { left: -150%; }
            20% { left: 150%; } /* Atravessa rápido até a direita */
            100% { left: 150%; } /* Espera o resto do tempo antes de recomeçar */
        }
    </style>
</head>
<body>

    <div id="card-container">
        <div class="card">
            <h2 id="modo-nome"></h2>   <div class="divider"></div>
            <p id="modo-desc"></p> </div>
    </div>

    <script type="module">
        // Importa as ferramentas necessárias do Firebase
        import { db, ref, onValue } from './firebase-config.js';

        // Seleciona os elementos da tela para podermos mexer neles
        const container = document.getElementById('card-container');
        const cardElement = document.querySelector('.card');
        const nomeTxt = document.getElementById('modo-nome');
        const descTxt = document.getElementById('modo-desc');
        const showcaseRef = ref(db, 'showcase'); // Referência da "gaveta" no Firebase

        // Variável para não ficar recarregando a mesma imagem várias vezes
        let imagemAtual = "";

        // Função que "escuta" as mudanças no banco de dados em tempo real
        onValue(showcaseRef, (snapshot) => {
            const data = snapshot.val(); // Pega os dados que chegaram
            
            // Verifica se deve mostrar a carta e se existe um link de imagem
            if (data && data.status_exibicao === 'visivel' && data.imagem_url) {
                
                // Só faz a animação se a imagem for diferente da que já está na tela
                if (data.imagem_url !== imagemAtual) {
                    
                    // 1. Fecha a carta atual (gira para fora)
                    container.classList.remove('visible');

                    // 2. Espera a animação de fechar (600ms) para trocar os dados escondido
                    setTimeout(() => {
                        // Troca a imagem de fundo
                        cardElement.style.backgroundImage = `url('${data.imagem_url}')`;
                        imagemAtual = data.imagem_url;
                        
                        // Atualiza os textos
                        nomeTxt.innerText = data.modo_atual;
                        descTxt.innerText = data.descricao;

                        // Adiciona um degradê por cima da imagem para o texto não sumir no fundo
                        cardElement.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.7)), url('${data.imagem_url}')`;
                        
                        // 3. Mostra a carta de novo com os novos dados (gira para dentro)
                        container.classList.add('visible');
                    }, 600); 

                } else {
                    // Se clicou no mesmo botão, apenas garante que a carta esteja visível
                    container.classList.add('visible');
                }
            } else {
                // Se o comando for para esconder, remove a classe de visibilidade
                container.classList.remove('visible');
                imagemAtual = "";
            }
        });
    </script>

</body>
</html>
