<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>MLBB Showcase - Overlay</title>
    <style>
        /* Fundo transparente para o OBS */
        body {
            margin: 0;
            overflow: hidden;
            background-color: transparent; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Container da animação */
        #card-container {
            perspective: 1000px;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Estilo da Carta */
        .card {
            width: 350px;
            height: 500px;
            /* Degradê estilo épico/mítico */
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            border: 5px solid #d4af37; /* Borda Dourada */
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.4), inset 0 0 20px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            color: white;
            text-align: center;
            padding: 40px 20px;
            position: relative;
            overflow: hidden;
            transform: rotateY(-90deg);
            transition: transform 0.8s;
        }

        /* Efeito de brilho passando pela carta */
        .card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        /* Quando a carta fica visível */
        #card-container.visible {
            opacity: 1;
            transform: scale(1);
        }
        #card-container.visible .card {
            transform: rotateY(0deg);
        }

        /* Textos */
        h2 {
            font-size: 2.5em;
            color: #f1c40f;
            text-transform: uppercase;
            text-shadow: 2px 4px 0px #000, 0 0 10px rgba(241, 196, 15, 0.5);
            margin: 0;
        }

        .divider {
            width: 80%;
            height: 2px;
            background: #d4af37;
            margin: 20px 0;
        }

        p {
            font-size: 1.3em;
            line-height: 1.4;
            text-shadow: 1px 2px 4px #000;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div id="card-container">
        <div class="card">
            <h2 id="modo-nome">MODO CARREGANDO</h2>
            <div class="divider"></div>
            <p id="modo-desc">Aguardando sinal do campo de batalha...</p>
            <div style="font-size: 0.8em; color: #aaa;">MLBB SHOWCASE</div>
        </div>
    </div>

    <script type="module">
        import { db, ref, onValue } from './firebase-config.js';

        const container = document.getElementById('card-container');
        const nomeTxt = document.getElementById('modo-nome');
        const descTxt = document.getElementById('modo-desc');

        const showcaseRef = ref(db, 'showcase');
        onValue(showcaseRef, (snapshot) => {
            const data = snapshot.val();
            if (data && data.status_exibicao === 'visivel') {
                nomeTxt.innerText = data.modo_atual;
                descTxt.innerText = data.descricao;
                container.classList.add('visible');
            } else {
                container.classList.remove('visible');
            }
        });
    </script>
</body>
</html>
