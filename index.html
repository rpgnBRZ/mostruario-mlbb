<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>MLBB Showcase - Overlay Simples</title>
    <style>
        /* Fundo transparente para o OBS */
        body {
            margin: 0;
            padding: 0;
            background-color: transparent; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Container sem efeitos */
        #image-container {
            display: none; /* Escondido por padrão */
        }

        /* Quando visível, apenas mostra o bloco */
        #image-container.visible {
            display: block;
        }

        /* A imagem ocupa o máximo da tela sem distorcer */
        img {
            max-width: 100vw;
            max-height: 100vh;
            display: block;
        }
    </style>
</head>
<body>

    <div id="image-container">
        <img id="display-imagem" src="" alt="Modo Atual">
    </div>

    <script type="module">
        import { db, ref, onValue } from './firebase-config.js';

        const container = document.getElementById('image-container');
        const imgElement = document.getElementById('display-imagem');

        const showcaseRef = ref(db, 'showcase');
        
        onValue(showcaseRef, (snapshot) => {
            const data = snapshot.val();
            
            if (data && data.status_exibicao === 'visivel' && data.imagem_url) {
                // Define o caminho da imagem recebido do Dashboard
                imgElement.src = data.imagem_url;
                
                // Torna o container visível imediatamente
                container.classList.add('visible');
            } else {
                // Esconde o container
                container.classList.remove('visible');
                imgElement.src = ""; // Limpa a imagem anterior
            }
        });
    </script>
</body>
</html>
