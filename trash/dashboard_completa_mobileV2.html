<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Completa - MLBB</title>

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --background: #09090b;
            --foreground: #fafafa;
            --surface: #18181b;
            --surface-hover: #27272a;
            --primary: #d4af37;
            --primary-hover: #fcd34d;
            --muted-foreground: #a1a1aa;
            --border: #27272a;
            --danger: #ef4444;
            --success: #22c55e;
            --radius: 8px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background);
            color: var(--foreground);
            display: flex;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- SIDEBAR --- */
        aside {
            width: 220px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 1.5rem 1rem;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 3rem;
            color: var(--primary);
        }

        .nav-btn {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            color: var(--muted-foreground);
            border-radius: var(--radius);
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .nav-btn:hover {
            background: var(--surface-hover);
            color: var(--foreground);
        }

        .nav-btn.active {
            background: rgba(212, 175, 55, 0.1);
            color: var(--primary);
        }

        /* --- MAIN CONTENT --- */
        main {
            flex: 1;
            padding: 2.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            background: var(--surface);
            padding: 0.5rem 1rem;
            border-radius: 999px;
            border: 1px solid var(--border);
            color: var(--muted-foreground);
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--danger);
        }

        .dot.active {
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
        }

        /* --- TAB CONTENT --- */
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- MANUAL SELECTION (Grid of Categories) --- */
        .manual-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1rem;
        }

        .cat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem;
        }

        .cat-title {
            color: var(--primary);
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .mode-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 0.5rem 0.75rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--foreground);
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 0.4rem;
            font-size: 0.8rem;
        }

        .mode-btn:hover {
            background: var(--surface-hover);
            border-color: var(--muted-foreground);
        }

        .mode-btn.active {
            border-color: var(--primary);
            background: rgba(212, 175, 55, 0.05);
            color: var(--primary);
        }

        .mode-btn .check-icon {
            display: none;
        }

        .mode-btn.active .check-icon {
            display: block;
        }

        /* --- ROLETA (Layout & Grid Selection) --- */
        .roleta-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.5rem;
            align-items: start;
        }

        .wheel-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .wheel-container {
            position: relative;
            width: 100%;
            max-width: 380px;
            aspect-ratio: 1 / 1;
        }

        #wheel-canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transition: transform 2s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .wheel-pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 25px;
            height: 25px;
            background: var(--primary);
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 10;
        }

        .spin-btn {
            background: var(--primary);
            color: black;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 800;
            border-radius: var(--radius);
            cursor: pointer;
            width: 100%;
            margin-top: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .spin-btn:hover:not(:disabled) {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        .spin-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ROLETA GRID SELECTION */
        .modes-grid-selection {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 0.75rem;
        }

        .mode-item-cb {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 0.75rem;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .mode-item-cb:hover {
            background: var(--surface-hover);
        }

        .mode-item-cb input {
            accent-color: var(--primary);
            width: 16px;
            height: 16px;
        }

        /* Global Actions */
        .btn-danger {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 0.75rem;
            border-radius: var(--radius);
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-weight: 600;
            margin-top: 1rem;
        }

        .btn-danger:hover {
            background: var(--danger);
            color: white;
        }

        /* --- DRAFT TAB CSS --- */
        .draft-top-section {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .draft-wheel-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .draft-wheel-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1 / 1;
        }

        #draft-wheel-canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 5px solid var(--border);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            transition: transform 2s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .draft-wheel-pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 25px;
            height: 25px;
            background: var(--primary);
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 10;
        }

        .draft-controls {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
        }

        .card h2 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .teams-list::-webkit-scrollbar {
            width: 6px;
        }

        .teams-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        /* CSS DA ÁRVORE COM ZOOM E PAN (NOVO) */
        .bracket-wrapper {
            position: relative;
            width: 100%;
        }

        .zoom-controls {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            display: flex;
            gap: 0.5rem;
            z-index: 50;
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(8px);
            padding: 0.5rem;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .btn-zoom {
            background: var(--background);
            color: var(--foreground);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.5rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-zoom:hover {
            background: var(--surface-hover);
            color: var(--primary);
        }

        .bracket-viewport {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            overflow: auto;
            /* Permite scroll nativo */
            max-height: 80vh;
            /* Para não ocupar a tela toda no celular */
            cursor: grab;
            position: relative;
        }

        .bracket-viewport:active {
            cursor: grabbing;
        }

        .bracket-viewport::-webkit-scrollbar {
            height: 8px;
            width: 8px;
        }

        .bracket-viewport::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .bracket-scale-content {
            transform-origin: top left;
            transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
            min-width: 1000px;
            /* Garante que os blocos não esmaguem */
            padding-bottom: 2rem;
        }

        .round-col {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .match-box {
            border: 1px solid var(--border);
            border-radius: 8px;
            width: 220px;
            background: var(--background);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            flex-shrink: 0;
        }

        .match-name {
            background: var(--surface-hover);
            font-size: 0.75rem;
            padding: 4px 8px;
            text-align: center;
            color: #a1a1aa;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            text-transform: uppercase;
        }

        .team-slot {
            padding: 0.75rem;
            font-weight: 600;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--border);
            transition: 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .team-slot:last-child {
            border-bottom: none;
        }

        .team-slot.clickable:hover {
            background: rgba(74, 222, 128, 0.15);
            cursor: pointer;
        }

        .team-slot.winner {
            background: rgba(212, 175, 55, 0.1);
            border-left: 3px solid var(--primary);
        }

        .section-title {
            color: white;
            margin-bottom: 1.5rem;
            text-align: center;
            font-family: 'Outfit';
            letter-spacing: 1px;
        }

        .btn-action {
            flex: 1;
            padding: 0.75rem 0.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            border: none;
        }

        .btn-restart {
            background: rgba(251, 146, 60, 0.1);
            border: 1px dashed #fb923c;
            color: #fb923c;
        }

        .btn-restart:hover {
            background: rgba(251, 146, 60, 0.2);
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.1);
            border: 1px dashed #ef4444;
            color: #ef4444;
        }

        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.2);
        }


        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            aside {
                position: fixed;
                bottom: 0;
                left: 0;
                width: 100%;
                height: auto;
                flex-direction: row;
                padding: 0.5rem;
                padding-bottom: max(0.5rem, env(safe-area-inset-bottom));
                border-right: none;
                border-top: 1px solid var(--border);
                background: rgba(24, 24, 27, 0.95);
                backdrop-filter: blur(10px);
                z-index: 50;
            }

            .brand {
                display: none;
            }

            .nav-btn {
                flex-direction: column;
                margin-bottom: 0;
                padding: 0.5rem 0.25rem;
                justify-content: center;
                gap: 0.4rem;
                font-size: 0.65rem;
                font-weight: 600;
                width: auto;
                flex: 1;
                border-radius: 8px;
                text-align: center;
                line-height: 1.1;
                white-space: normal;
            }

            .nav-btn i {
                width: 20px !important;
                height: 20px !important;
                margin: 0 auto;
            }

            aside>div {
                margin-top: 0 !important;
                flex: 1;
                display: flex;
            }

            .btn-danger {
                margin-top: 0;
                padding: 0.5rem 0.25rem;
                font-size: 0.65rem;
                font-weight: 600;
                flex-direction: column;
                gap: 0.4rem;
                border: none;
                background: transparent;
                width: 100%;
                height: 100%;
                text-align: center;
                line-height: 1.1;
                white-space: normal;
            }

            .btn-danger:hover {
                background: rgba(239, 68, 68, 0.1);
                color: var(--danger);
            }

            .btn-danger i {
                width: 20px !important;
                height: 20px !important;
                margin: 0 auto;
            }

            main {
                padding: 1.5rem 1rem 6rem 1rem;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }

            .roleta-layout {
                grid-template-columns: 1fr;
            }

            .wheel-box {
                padding: 1.5rem 1rem;
            }

            .spin-btn {
                padding: 1rem;
                font-size: 1rem;
            }

            .draft-top-section {
                grid-template-columns: 1fr;
            }

            .draft-wheel-box {
                padding: 1.5rem 1rem;
            }

            .bracket-viewport {
                padding: 1rem;
            }
        }
    </style>
</head>

<body>

    <aside>
        <div class="brand">
            <i data-lucide="layout-dashboard" style="width: 28px;"></i>
            <h1 style="font-family: 'Outfit'; font-size: 1.2rem;">MLBB ADMIN</h1>
        </div>

        <button class="nav-btn active" onclick="switchTab('manual')">
            <i data-lucide="mouse-pointer-2"></i> Manual
        </button>
        <button class="nav-btn" onclick="switchTab('roleta')">
            <i data-lucide="rotate-cw"></i> Roleta
        </button>
        <button class="nav-btn" onclick="switchTab('draft')">
            <i data-lucide="users"></i> Draft
        </button>

        <div style="margin-top: auto;">
            <button id="btn-hide-global" class="btn-danger">
                <i data-lucide="eye-off"></i> Esconder
            </button>
        </div>
    </aside>

    <main>
        <div class="header">
            <h2 id="tab-title" style="font-size: 1.5rem; font-family: 'Outfit';">Seleção Manual</h2>
            <div class="status-pill">
                <div id="status-dot" class="dot"></div>
                <span id="status-text">Overlay Oculto</span>
            </div>
        </div>

        <!-- TAB: MANUAL -->
        <div id="tab-manual" class="tab-content active">
            <div id="manual-container" class="manual-grid">
                <!-- Injected via JS -->
            </div>
        </div>

        <!-- TAB: ROLETA -->
        <div id="tab-roleta" class="tab-content">
            <div class="roleta-layout">
                <div class="wheel-box">
                    <div class="wheel-container">
                        <div class="wheel-pointer"></div>
                        <canvas id="wheel-canvas" width="1000" height="1000"></canvas>
                    </div>
                    <button id="trigger-spin" class="spin-btn">Girar Roleta</button>
                    <div style="margin-top: 1.5rem; text-align: center;">
                        <span style="color: var(--muted-foreground); font-size: 0.8rem;">Último Resultado:</span>
                        <div id="winner-name" style="font-size: 1.5rem; font-weight: 800; color: var(--primary);">---
                        </div>
                    </div>
                </div>

                <div class="selection-box">
                    <h3 class="cat-title" style="margin-bottom: 1.5rem;"><i data-lucide="settings-2"></i> Modos Ativos
                        na Roleta</h3>
                    <div id="roleta-selection-grid" class="modes-grid-selection">
                        <!-- Checkboxes in Grid injected via JS -->
                    </div>
                </div>
            </div>
        </div>

        <!-- TAB: DRAFT -->
        <div id="tab-draft" class="tab-content">
            <div class="draft-top-section">
                <div class="draft-wheel-box">
                    <div class="draft-wheel-container">
                        <div class="draft-wheel-pointer"></div>
                        <canvas id="draft-wheel-canvas" width="1000" height="1000"></canvas>
                    </div>
                    <div style="margin-top: 1.5rem; text-align: center;">
                        <span style="color: var(--muted-foreground); font-size: 0.8rem;">Sorteado:</span>
                        <div id="draft-winner-name" style="font-size: 1.5rem; font-weight: 800; color: var(--primary);">
                            ---</div>
                    </div>
                </div>

                <div class="draft-controls">
                    <div class="card">
                        <h2><i data-lucide="users"></i> Adicionar Equipe</h2>
                        <div style="display: flex; gap: 0.5rem; margin-bottom: 1rem;">
                            <input type="text" id="draft-team-input" placeholder="Nome da equipe/jogador..."
                                style="flex: 1; padding: 0.75rem; border-radius: 8px; border: 1px solid var(--border); background: var(--background); color: var(--foreground); outline: none;">
                            <button type="button" id="btn-add-team"
                                style="background: var(--surface-hover); color: var(--foreground); border: 1px solid var(--border); padding: 0 1rem; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s;">Add</button>
                        </div>
                        <div id="teams-container" class="teams-list"
                            style="display: flex; flex-direction: column; gap: 0.5rem; max-height: 200px; overflow-y: auto; padding-right: 0.5rem;">
                            <div style="color: #71717a; font-size: 0.85rem; text-align: center;">Vazio</div>
                        </div>

                        <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
                            <button type="button" id="btn-restart-tourney" class="btn-action btn-restart"
                                title="Mantém os nomes, mas zera as chaves">
                                <i data-lucide="rotate-ccw" style="width: 16px;"></i> Reiniciar
                            </button>
                            <button type="button" id="btn-clear-all" class="btn-action btn-delete"
                                title="Apaga todos os nomes e as chaves">
                                <i data-lucide="trash-2" style="width: 16px;"></i> Apagar
                            </button>
                        </div>
                    </div>

                    <div class="card">
                        <h2><i data-lucide="zap"></i> Ação</h2>
                        <button id="draft-trigger-spin" class="spin-btn" disabled>
                            <i data-lucide="rotate-cw"></i> Sortear Vaga
                        </button>
                    </div>
                </div>
            </div>

            <section class="bracket-wrapper">

                <!-- Controles de Zoom -->
                <div class="zoom-controls">
                    <button class="btn-zoom" id="btn-zoom-out" title="Afastar (-)"><i data-lucide="zoom-out"
                            style="width: 20px;"></i></button>
                    <button class="btn-zoom" id="btn-zoom-reset" title="Restaurar Padrão"><i data-lucide="maximize"
                            style="width: 20px;"></i></button>
                    <button class="btn-zoom" id="btn-zoom-in" title="Aproximar (+)"><i data-lucide="zoom-in"
                            style="width: 20px;"></i></button>
                </div>

                <!-- Viewport (Área de rolagem/arraste) -->
                <div class="bracket-viewport" id="bracket-viewport">

                    <!-- Conteúdo Escalável -->
                    <div class="bracket-scale-content" id="bracket-content">
                        <h2 class="section-title" style="color: var(--primary);">CHAVE SUPERIOR (VITÓRIA)</h2>
                        <div
                            style="display: flex; gap: 2rem; margin-bottom: 2rem; min-width: 800px; justify-content: center;">
                            <div class="round-col" id="col-w1"></div>
                            <div class="round-col" id="col-w2" style="justify-content: space-around;"></div>
                            <div class="round-col" id="col-w3" style="justify-content: center;"></div>
                        </div>

                        <h2 class="section-title"
                            style="color: #f87171; border-top: 2px dashed var(--border); padding-top: 2rem; margin-top: 2rem;">
                            CHAVE INFERIOR (DERROTA)</h2>
                        <div style="display: flex; gap: 2rem; min-width: 800px; justify-content: center;">
                            <div class="round-col" id="col-l1" style="justify-content: space-around;"></div>
                            <div class="round-col" id="col-l2" style="justify-content: space-around;"></div>
                            <div class="round-col" id="col-l3" style="justify-content: center;"></div>
                            <div class="round-col" id="col-l4" style="justify-content: center;"></div>
                        </div>

                        <div
                            style="display: flex; justify-content: center; margin-top: 3rem; padding-top: 2rem; border-top: 2px solid var(--primary);">
                            <div class="round-col" id="col-gf">
                                <h3
                                    style="text-align:center; color: var(--primary); margin-bottom: 1rem; font-family: 'Outfit';">
                                    GRANDE FINAL</h3>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script type="module">
        import { db, ref, set, onValue } from './firebase-config.js';

        // --- DATABASE OF MODES ---
        const fullModosData = [

            { id: 'lane-xp', nome: 'Lane XP', cat: 'Lanes', color: '#f87171', img: 'APENAS_UNICO(A)-lane_xp.jpeg', icon: 'swords' },
            { id: 'proibido-executar', nome: 'Proibido Executar', cat: 'Proibições', color: '#ef4444', img: 'EU_PROIBO-feitiço-executar.jpeg', icon: 'ban' },
            { id: 'proibido-petrificar', nome: 'Proibido Petrificar', cat: 'Proibições', color: '#ef4444', img: 'EU_PROIBO-feitiço-petrificar.jpeg', icon: 'ban' },
            { id: 'proibido-smite', nome: 'Proibido Smite', cat: 'Proibições', color: '#ef4444', img: 'EU_PROIBO-feitiço-smite.jpeg', icon: 'ban' },
            { id: 'proibido-flash', nome: 'Proibido Flash', cat: 'Proibições', color: '#ef4444', img: 'EU_PROIBO-feito-flash.jpeg', icon: 'ban' },
            { id: 'mid-bloqueada', nome: 'Mid Bloqueada', cat: 'Proibições', color: '#4b5563', img: 'EU_PROIBO-lane_mid_bloqueada.jpeg', icon: 'lock' },
            { id: 'ouro-bloqueada', nome: 'Ouro Bloqueada', cat: 'Proibições', color: '#4b5563', img: 'EU_PROIBO-lane_ouro.jpeg', icon: 'lock' },
            { id: 'xp-bloqueada', nome: 'XP Bloqueada', cat: 'Proibições', color: '#4b5563', img: 'EU_PROIBO-lane_xp.jpeg', icon: 'lock' },
            { id: 'lord-proibido', nome: 'Lord Proibido', cat: 'Proibições', color: '#7c2d12', img: 'EU_PROIBO-lord.jpeg', icon: 'skull' },
            { id: 'suportes-banidos', nome: 'Suportes Banidos', cat: 'Proibições', color: '#991b1b', img: 'EU_PROIBO-suportes_banidos.jpeg', icon: 'user-minus' },
            { id: 'tanks-banidos', nome: 'Tanks Banidos', cat: 'Proibições', color: '#991b1b', img: 'EU_PROIBO-tanks_banidos.jpeg', icon: 'user-minus' },
            { id: 'sem-comunicacao', nome: 'Sem Comunicação', cat: 'Proibições', color: '#ef4444', img: 'EU_PROIBO-comunicação.jpeg', icon: 'mic-off' }
        ];

        const catIcons = { 'Especiais': 'star', 'Classes': 'swords', 'Lanes': 'map', 'Proibições': 'shield-alert' };
        let activeRoletaModos = [...fullModosData];
        let isSpinning = false;

        // --- TAB SWITCHING ---
        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            event.currentTarget.classList.add('active');

            const titles = {
                'manual': 'Seleção Manual',
                'roleta': 'Roleta Sincronizada',
                'draft': 'Draft MLBB'
            };
            document.getElementById('tab-title').innerText = titles[tab] || 'Dashboard';

            if (tab === 'roleta') drawWheel();
            if (tab === 'draft') {
                drawDraftWheel();
                renderBracket();
            }
        };

        // --- RENDER MANUAL SELECTION ---
        const manualContainer = document.getElementById('manual-container');
        const cats = [...new Set(fullModosData.map(m => m.cat))];

        cats.forEach(cat => {
            const card = document.createElement('div');
            card.className = 'cat-card';
            card.innerHTML = `<h3 class="cat-title"><i data-lucide="${catIcons[cat] || 'package'}"></i> ${cat}</h3>`;

            fullModosData.filter(m => m.cat === cat).forEach(modo => {
                const btn = document.createElement('button');
                btn.className = 'mode-btn';
                btn.id = `manual-${modo.id}`;
                btn.innerHTML = `
                    <div style="display:flex; align-items:center; gap:0.5rem;">
                        <i data-lucide="${modo.icon || 'circle'}" style="width:14px; opacity:0.6;"></i>
                        <span>${modo.nome}</span>
                    </div>
                    <i data-lucide="check" class="check-icon" style="width:14px;"></i>
                `;
                btn.onclick = () => {
                    set(ref(db, 'showcase'), {
                        modo_id: modo.id,
                        modo_atual: modo.nome,
                        imagem_url: 'assets/' + modo.img,
                        status_exibicao: 'visivel'
                    });
                };
                card.appendChild(btn);
            });
            manualContainer.appendChild(card);
        });

        // --- RENDER ROLETA GRID SELECTION ---
        const roletaGrid = document.getElementById('roleta-selection-grid');
        fullModosData.forEach(modo => {
            const label = document.createElement('label');
            label.className = 'mode-item-cb';
            label.innerHTML = `
                <input type="checkbox" checked value="${modo.id}" class="roleta-cb">
                <span>${modo.nome}</span>
            `;
            roletaGrid.appendChild(label);
        });

        document.querySelectorAll('.roleta-cb').forEach(cb => {
            cb.onchange = () => {
                const ids = Array.from(document.querySelectorAll('.roleta-cb:checked')).map(el => el.value);
                set(ref(db, 'roleta_config/active_modes'), ids);
            };
        });

        // --- WHEEL LOGIC (MODES) ---
        const canvas = document.getElementById('wheel-canvas');
        const ctx = canvas.getContext('2d');

        function drawWheel() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = canvas.width / 2 - 10;
            if (activeRoletaModos.length === 0) { ctx.clearRect(0, 0, canvas.width, canvas.height); return; }
            const sliceAngle = (2 * Math.PI) / activeRoletaModos.length;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            activeRoletaModos.forEach((modo, i) => {
                const angle = i * sliceAngle;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, angle, angle + sliceAngle);
                ctx.fillStyle = i % 2 === 0 ? '#18181b' : '#222226';
                ctx.fill();
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(angle + sliceAngle / 2);
                ctx.textAlign = 'right';
                ctx.fillStyle = modo.color || '#fff';
                ctx.font = 'bold 30px Inter';
                ctx.fillText(modo.nome, radius - 40, 10);
                ctx.restore();
            });
        }

        function spinLocally(targetId) {
            if (isSpinning) return;
            isSpinning = true;
            const idx = activeRoletaModos.findIndex(m => m.id === targetId);
            const extra = 8 + Math.floor(Math.random() * 5);
            const slice = 360 / activeRoletaModos.length;
            const rot = (extra * 360) + (270 - (idx * slice) - (slice / 2));
            canvas.style.transform = `rotate(${rot}deg)`;
            setTimeout(() => {
                isSpinning = false;
                document.getElementById('winner-name').innerText = activeRoletaModos[idx].nome;
                document.getElementById('winner-name').style.color = activeRoletaModos[idx].color;
            }, 2000);
        }

        document.getElementById('trigger-spin').onclick = () => {
            if (activeRoletaModos.length === 0) return alert("Selecione modos!");
            const winner = activeRoletaModos[Math.floor(Math.random() * activeRoletaModos.length)];
            spinLocally(winner.id);
            set(ref(db, 'roleta_command'), { command: 'spin', targetId: winner.id, timestamp: Date.now() });
        };


        // --- DRAFT LOGIC ---
        const draftCanvas = document.getElementById('draft-wheel-canvas');
        const draftCtx = draftCanvas.getContext('2d');
        const draftTriggerSpin = document.getElementById('draft-trigger-spin');
        const draftWinnerName = document.getElementById('draft-winner-name');
        const draftTeamInput = document.getElementById('draft-team-input');

        const DRAFT_MAX_TEAMS = 8;
        const draftColors = ['#f87171', '#fb923c', '#fbbf24', '#4ade80', '#60a5fa', '#818cf8', '#c084fc', '#f472b6'];

        let draftCurrentRotation = 0;
        let draftIsSpinning = false;

        /* ==========================================
           LÓGICA DO ZOOM E PAN (ARRASTAR)
        ========================================== */
        const bracketContent = document.getElementById('bracket-content');
        const bracketViewport = document.getElementById('bracket-viewport');
        let currentZoom = 1;

        // Controle de Botões
        document.getElementById('btn-zoom-in').addEventListener('click', () => { setZoom(currentZoom + 0.15); });
        document.getElementById('btn-zoom-out').addEventListener('click', () => { setZoom(currentZoom - 0.15); });
        document.getElementById('btn-zoom-reset').addEventListener('click', () => {
            setZoom(1);
            bracketViewport.scrollTo({ top: 0, left: 0, behavior: 'smooth' });
        });

        function setZoom(newZoom) {
            currentZoom = Math.max(0.4, Math.min(newZoom, 1.5)); // Limita o zoom entre 40% e 150%
            bracketContent.style.transform = `scale(${currentZoom})`;

            // Ajusta o width virtual para que a barra de rolagem funcione direito mesmo após diminuir/aumentar
            bracketContent.style.width = `${100 / currentZoom}%`;
        }

        // Sistema de arrastar (Pan) com o Mouse/Dedo
        let isDragging = false;
        let startX, startY, scrollLeft, scrollTop;

        // Eventos para Mouse (PC)
        bracketViewport.addEventListener('mousedown', (e) => {
            isDragging = true;
            bracketViewport.style.cursor = 'grabbing';
            startX = e.pageX - bracketViewport.offsetLeft;
            startY = e.pageY - bracketViewport.offsetTop;
            scrollLeft = bracketViewport.scrollLeft;
            scrollTop = bracketViewport.scrollTop;
        });

        bracketViewport.addEventListener('mouseleave', () => { isDragging = false; bracketViewport.style.cursor = 'grab'; });
        bracketViewport.addEventListener('mouseup', () => { isDragging = false; bracketViewport.style.cursor = 'grab'; });

        bracketViewport.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            e.preventDefault(); // Impede seleção de texto enquanto arrasta
            const x = e.pageX - bracketViewport.offsetLeft;
            const y = e.pageY - bracketViewport.offsetTop;
            const walkX = (x - startX) * 1.5; // Multiplicador de velocidade do arrasto
            const walkY = (y - startY) * 1.5;
            bracketViewport.scrollLeft = scrollLeft - walkX;
            bracketViewport.scrollTop = scrollTop - walkY;
        });

        const defaultMatchData = {
            W1: { name: "Quartas 1", t1: null, t2: null, w: { m: 'W5', s: 't1' }, l: { m: 'L1', s: 't1' }, winnerSlot: null },
            W2: { name: "Quartas 2", t1: null, t2: null, w: { m: 'W5', s: 't2' }, l: { m: 'L1', s: 't2' }, winnerSlot: null },
            W3: { name: "Quartas 3", t1: null, t2: null, w: { m: 'W6', s: 't1' }, l: { m: 'L2', s: 't1' }, winnerSlot: null },
            W4: { name: "Quartas 4", t1: null, t2: null, w: { m: 'W6', s: 't2' }, l: { m: 'L2', s: 't2' }, winnerSlot: null },
            W5: { name: "Semi 1", t1: null, t2: null, w: { m: 'W7', s: 't1' }, l: { m: 'L4', s: 't1' }, winnerSlot: null },
            W6: { name: "Semi 2", t1: null, t2: null, w: { m: 'W7', s: 't2' }, l: { m: 'L3', s: 't1' }, winnerSlot: null },
            W7: { name: "Final Superior", t1: null, t2: null, w: { m: 'GF', s: 't1' }, l: { m: 'L6', s: 't1' }, winnerSlot: null },

            L1: { name: "L-Round 1", t1: null, t2: null, w: { m: 'L3', s: 't2' }, l: null, winnerSlot: null },
            L2: { name: "L-Round 1", t1: null, t2: null, w: { m: 'L4', s: 't2' }, l: null, winnerSlot: null },
            L3: { name: "L-Quartas", t1: null, t2: null, w: { m: 'L5', s: 't1' }, l: null, winnerSlot: null },
            L4: { name: "L-Quartas", t1: null, t2: null, w: { m: 'L5', s: 't2' }, l: null, winnerSlot: null },
            L5: { name: "L-Semi", t1: null, t2: null, w: { m: 'L6', s: 't2' }, l: null, winnerSlot: null },
            L6: { name: "Final Inferior", t1: null, t2: null, w: { m: 'GF', s: 't2' }, l: null, winnerSlot: null },

            GF: { name: "Grande Final", t1: null, t2: null, w: null, l: null, winnerSlot: null }
        };

        const drawOrder = [
            { m: 'W1', s: 't1' }, { m: 'W1', s: 't2' },
            { m: 'W2', s: 't1' }, { m: 'W2', s: 't2' },
            { m: 'W3', s: 't1' }, { m: 'W3', s: 't2' },
            { m: 'W4', s: 't1' }, { m: 'W4', s: 't2' }
        ];

        let initialTeams = JSON.parse(localStorage.getItem('mlbb_initial_teams')) || [];
        let poolTeams = JSON.parse(localStorage.getItem('mlbb_pool_teams')) || [];
        let drawnTeamsCount = parseInt(localStorage.getItem('mlbb_drawn_count')) || 0;
        let matchData = JSON.parse(localStorage.getItem('mlbb_match_data')) || JSON.parse(JSON.stringify(defaultMatchData));

        function saveDraftState() {
            localStorage.setItem('mlbb_initial_teams', JSON.stringify(initialTeams));
            localStorage.setItem('mlbb_pool_teams', JSON.stringify(poolTeams));
            localStorage.setItem('mlbb_drawn_count', drawnTeamsCount.toString());
            localStorage.setItem('mlbb_match_data', JSON.stringify(matchData));
        }

        document.getElementById('btn-restart-tourney').addEventListener('click', () => {
            if (initialTeams.length === 0) return alert("Não há equipes salvas para reiniciar um torneio.");
            if (confirm("Isso vai apagar os resultados das chaves e devolver os times originais para a roleta. Continuar?")) {
                poolTeams = JSON.parse(JSON.stringify(initialTeams));
                matchData = JSON.parse(JSON.stringify(defaultMatchData));
                drawnTeamsCount = 0;
                draftWinnerName.innerText = "---";
                draftWinnerName.style.color = "var(--primary)";
                saveDraftState();
                atualizarRoletaDraftUI();
                set(ref(db, 'bracket_data'), { state: matchData, timestamp: Date.now() });
            }
        });

        document.getElementById('btn-clear-all').addEventListener('click', () => {
            if (confirm("ATENÇÃO: Isso vai excluir todos os times da roleta e apagar o torneio atual. Continuar?")) {
                initialTeams = [];
                poolTeams = [];
                drawnTeamsCount = 0;
                matchData = JSON.parse(JSON.stringify(defaultMatchData));
                draftWinnerName.innerText = "---";
                draftWinnerName.style.color = "var(--primary)";
                saveDraftState();
                atualizarRoletaDraftUI();
                set(ref(db, 'bracket_data'), { state: matchData, timestamp: Date.now() });
            }
        });

        document.getElementById('btn-add-team').addEventListener('click', (e) => {
            e.preventDefault();
            const val = draftTeamInput.value.trim();
            if (!val) return;
            if (initialTeams.length >= DRAFT_MAX_TEAMS) return alert(`Limite de ${DRAFT_MAX_TEAMS} times!`);

            const newTeam = {
                id: 'team_' + Date.now(),
                nome: val,
                color: draftColors[(initialTeams.length) % draftColors.length]
            };

            initialTeams.push(newTeam);
            poolTeams.push(newTeam);
            draftTeamInput.value = '';

            saveDraftState();
            atualizarRoletaDraftUI();
        });

        draftTeamInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('btn-add-team').click(); });

        function atualizarRoletaDraftUI() {
            const container = document.getElementById('teams-container');
            container.innerHTML = poolTeams.length ? '' : '<div style="color: #71717a; text-align: center; font-size: 0.85rem;">Vazio</div>';

            poolTeams.forEach((t) => {
                container.innerHTML += `
                    <div style="background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 0.5rem 0.75rem; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem;">
                        <span style="font-weight: 600; color: ${t.color}">${t.nome}</span>
                        <button onclick="removerTime('${t.id}')" style="background:none; border:none; color:#ef4444; cursor:pointer; font-weight:bold;">X</button>
                    </div>`;
            });

            draftTriggerSpin.disabled = poolTeams.length === 0 || drawnTeamsCount >= DRAFT_MAX_TEAMS;
            drawDraftWheel();
            renderBracket();
        }

        window.removerTime = function (teamId) {
            poolTeams = poolTeams.filter(t => t.id !== teamId);
            initialTeams = initialTeams.filter(t => t.id !== teamId);
            saveDraftState();
            atualizarRoletaDraftUI();
        }

        function drawDraftWheel() {
            const centerX = draftCanvas.width / 2;
            const centerY = draftCanvas.height / 2;
            const radius = draftCanvas.width / 2 - 10;
            draftCtx.clearRect(0, 0, draftCanvas.width, draftCanvas.height);

            if (poolTeams.length === 0) {
                draftCtx.beginPath(); draftCtx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
                draftCtx.fillStyle = '#18181b'; draftCtx.fill(); draftCtx.strokeStyle = '#27272a'; draftCtx.lineWidth = 5; draftCtx.stroke();
                draftCtx.fillStyle = '#52525b'; draftCtx.font = 'bold 40px Inter'; draftCtx.textAlign = 'center';
                draftCtx.fillText('Adicione Equipes', centerX, centerY + 15);
                return;
            }

            const sliceAngle = (2 * Math.PI) / poolTeams.length;
            poolTeams.forEach((modo, i) => {
                const angle = i * sliceAngle;
                draftCtx.beginPath(); draftCtx.moveTo(centerX, centerY); draftCtx.arc(centerX, centerY, radius, angle, angle + sliceAngle);
                draftCtx.fillStyle = i % 2 === 0 ? '#18181b' : '#27272a'; draftCtx.fill();
                draftCtx.strokeStyle = modo.color; draftCtx.lineWidth = 2; draftCtx.stroke();

                draftCtx.save(); draftCtx.translate(centerX, centerY); draftCtx.rotate(angle + sliceAngle / 2);
                draftCtx.textAlign = 'right'; draftCtx.fillStyle = modo.color || '#fff'; draftCtx.font = 'bold 35px Inter';
                draftCtx.fillText(modo.nome, radius - 40, 12); draftCtx.restore();
            });
        }

        draftTriggerSpin.onclick = () => {
            if (draftIsSpinning || poolTeams.length === 0) return;

            draftIsSpinning = true; draftTriggerSpin.disabled = true;
            draftTeamInput.disabled = true; document.getElementById('btn-add-team').disabled = true;

            const winnerIndex = Math.floor(Math.random() * poolTeams.length);
            const winner = poolTeams[winnerIndex];

            const extraSpins = 5 + Math.floor(Math.random() * 3);
            const sliceAngle = 360 / poolTeams.length;
            const targetRotation = (extraSpins * 360) + (270 - (winnerIndex * sliceAngle) - (sliceAngle / 2));

            draftCurrentRotation += targetRotation;
            draftCanvas.style.transform = `rotate(${draftCurrentRotation}deg)`;

            set(ref(db, 'roleta_command'), { command: 'spin', targetId: winner.id, timestamp: Date.now() });

            setTimeout(() => {
                draftWinnerName.innerText = winner.nome;
                draftWinnerName.style.color = winner.color;

                const slot = drawOrder[drawnTeamsCount];
                matchData[slot.m][slot.s] = winner;

                poolTeams.splice(winnerIndex, 1);
                drawnTeamsCount++;

                saveDraftState();

                draftCanvas.style.transition = 'none'; draftCanvas.style.transform = `rotate(0deg)`; draftCurrentRotation = 0;
                set(ref(db, 'bracket_data'), { state: matchData, timestamp: Date.now() });

                setTimeout(() => {
                    draftCanvas.style.transition = 'transform 3s cubic-bezier(0.15, 0, 0.15, 1)';
                    atualizarRoletaDraftUI();
                    draftIsSpinning = false; draftTeamInput.disabled = false; document.getElementById('btn-add-team').disabled = false;
                }, 50);

            }, 3000);
        };

        window.setWinner = function (matchId, clickedSlot) {
            const match = matchData[matchId];
            if (!match.t1 || !match.t2 || match.winnerSlot) return;

            const winnerTeam = match[clickedSlot];
            const loserSlot = clickedSlot === 't1' ? 't2' : 't1';
            const loserTeam = match[loserSlot];

            match.winnerSlot = clickedSlot;

            if (match.w) matchData[match.w.m][match.w.s] = winnerTeam;
            if (match.l) matchData[match.l.m][match.l.s] = loserTeam;

            saveDraftState();
            set(ref(db, 'bracket_data'), { state: matchData, timestamp: Date.now() });
            renderBracket();
        }

        function generateMatchHTML(matchId) {
            const match = matchData[matchId];
            const t1 = match.t1;
            const t2 = match.t2;
            const canClick = t1 && t2 && !match.winnerSlot;

            return `
            <div class="match-box">
                <div class="match-name">${match.name}</div>
                <div class="team-slot ${canClick ? 'clickable' : ''} ${match.winnerSlot === 't1' ? 'winner' : ''}" 
                     onclick="${canClick ? `setWinner('${matchId}', 't1')` : ''}" 
                     style="color: ${t1 ? t1.color : '#a1a1aa'}">
                    <span>${t1 ? t1.nome : 'Aguardando...'}</span>
                    ${match.winnerSlot === 't1' ? '<i data-lucide="check" style="width: 16px; color: var(--primary);"></i>' : ''}
                </div>
                <div class="team-slot ${canClick ? 'clickable' : ''} ${match.winnerSlot === 't2' ? 'winner' : ''}" 
                     onclick="${canClick ? `setWinner('${matchId}', 't2')` : ''}" 
                     style="color: ${t2 ? t2.color : '#a1a1aa'}">
                    <span>${t2 ? t2.nome : 'Aguardando...'}</span>
                    ${match.winnerSlot === 't2' ? '<i data-lucide="check" style="width: 16px; color: var(--primary);"></i>' : ''}
                </div>
            </div>`;
        }

        function renderBracket() {
            document.getElementById('col-w1').innerHTML = generateMatchHTML('W1') + generateMatchHTML('W2') + generateMatchHTML('W3') + generateMatchHTML('W4');
            document.getElementById('col-w2').innerHTML = generateMatchHTML('W5') + generateMatchHTML('W6');
            document.getElementById('col-w3').innerHTML = generateMatchHTML('W7');

            document.getElementById('col-l1').innerHTML = generateMatchHTML('L1') + generateMatchHTML('L2');
            document.getElementById('col-l2').innerHTML = generateMatchHTML('L3') + generateMatchHTML('L4');
            document.getElementById('col-l3').innerHTML = generateMatchHTML('L5');
            document.getElementById('col-l4').innerHTML = generateMatchHTML('L6');

            document.getElementById('col-gf').innerHTML = `<h3 style="text-align:center; color: var(--primary); margin-bottom: 1rem; font-family: 'Outfit';">GRANDE FINAL</h3>` + generateMatchHTML('GF');

            lucide.createIcons();
        }

        // --- FIREBASE SYNC (GLOBAL) ---
        onValue(ref(db, 'roleta_config/active_modes'), (snapshot) => {
            const ids = snapshot.val();
            activeRoletaModos = ids ? fullModosData.filter(m => ids.includes(m.id)) : [...fullModosData];
            document.querySelectorAll('.roleta-cb').forEach(cb => cb.checked = ids ? ids.includes(cb.value) : true);
            drawWheel();
        });

        onValue(ref(db, 'showcase'), (snapshot) => {
            const data = snapshot.val();
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');

            if (data && data.status_exibicao === 'visivel') {
                statusDot.classList.add('active');
                statusText.innerText = 'Overlay Visível';
                const modo = fullModosData.find(m => (data.modo_id && m.id === data.modo_id) || (data.imagem_url && data.imagem_url.includes(m.img)) || m.nome === data.modo_atual);
                if (modo) document.getElementById(`manual-${modo.id}`)?.classList.add('active');
            } else {
                statusDot.classList.remove('active');
                statusText.innerText = 'Overlay Oculto';
            }
        });

        document.getElementById('btn-hide-global').onclick = () => set(ref(db, 'showcase'), { status_exibicao: 'oculto' });

        // INITS
        drawWheel();
        atualizarRoletaDraftUI();
        lucide.createIcons();
    </script>
</body>

</html>
